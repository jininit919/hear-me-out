<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hear Me Out">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hear Me Out — Vstupenka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg2:#080808;--bg3:#101010;--bg4:#181818;
  --red:#8b0000;--red2:#b20000;--red3:#cc0000;
  --txt:#e8e8e8;--txt2:#888;--txt3:#444;
  --border:#1a1a1a;--border2:#222;
}
body{background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
a{color:inherit;text-decoration:none}

.ticket{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border2);position:relative;overflow:hidden}

/* top stripe */
.ticket-stripe{height:6px;background:linear-gradient(90deg,var(--red),var(--red2),#cc2200)}

.ticket-body{padding:28px 28px 0}
.ticket-brand{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:0.2em;color:var(--txt3);margin-bottom:20px}
.ticket-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:0.08em;line-height:1.1;margin-bottom:16px}
.ticket-meta{display:flex;flex-direction:column;gap:7px;margin-bottom:20px}
.ticket-row{display:flex;align-items:center;gap:10px;font-size:12px;letter-spacing:0.04em}
.ticket-row svg{flex-shrink:0;color:var(--txt3)}
.ticket-row .val{color:var(--txt2)}

.ticket-divider{border:none;border-top:1px dashed var(--border2);margin:0 -28px}
.ticket-divider::before,.ticket-divider::after{content:'';display:block;width:20px;height:20px;border-radius:50%;background:var(--bg);border:1px solid var(--border2);position:absolute;top:50%;transform:translateY(-50%)}
.ticket-divider-wrap{position:relative;margin:0 28px;height:1px;margin-bottom:24px;margin-top:0}
.ticket-divider-wrap::before{content:'';position:absolute;top:0;left:-48px;right:-48px;border-top:1px dashed var(--border2)}
.ticket-divider-wrap::after{display:none}
.notch-l,.notch-r{width:20px;height:20px;border-radius:50%;background:var(--bg);border:1px solid var(--border2);position:absolute;top:-10px}
.notch-l{left:-38px}.notch-r{right:-38px}

.ticket-qr-wrap{display:flex;flex-direction:column;align-items:center;padding:0 0 24px}
#qrcode canvas, #qrcode img{display:block}
.ticket-code{font-size:11px;letter-spacing:0.18em;color:var(--txt3);margin-top:12px;text-transform:uppercase}

.ticket-holder{display:flex;align-items:center;gap:10px;padding:16px 28px;border-top:1px solid var(--border);background:var(--bg3)}
.ticket-holder-avatar{width:32px;height:32px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--txt3);flex-shrink:0}
.ticket-holder-name{font-size:12px;letter-spacing:0.04em}
.ticket-holder-sub{font-size:10px;color:var(--txt3);margin-top:2px;letter-spacing:0.04em}

.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;letter-spacing:0.12em;padding:3px 9px;border-radius:1px;margin-bottom:16px}
.status-badge.valid{background:rgba(74,222,128,0.1);color:#4ade80}
.status-badge.used{background:rgba(255,255,255,0.05);color:var(--txt3)}
.status-badge.paid{background:rgba(74,222,128,0.1);color:#4ade80}

.back-link{margin-top:20px;font-size:10px;letter-spacing:0.1em;color:var(--txt3);transition:color 0.15s}
.back-link:hover{color:var(--red2)}

.loading{font-size:12px;color:var(--txt3);letter-spacing:0.06em;padding:60px 0}
.error{font-size:13px;color:var(--red2);text-align:center;padding:40px 0}
</style>
</head>
<body>

<div id="root"><div class="loading">Načítám vstupenku...</div></div>

<script>
function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }

const code = location.pathname.split('/ticket/')[1];

async function init() {
  const res = await fetch(`/api/ticket/${code}`);
  if (res.status === 401) { window.location.href = '/login'; return; }
  const root = document.getElementById('root');
  if (!res.ok) {
    root.innerHTML = `<div class="error">Vstupenka nenalezena.</div><a href="/" class="back-link">← Feed</a>`;
    return;
  }
  const t = await res.json();

  const statusLabel = t.status === 'used' ? 'POUŽITÁ' : 'PLATNÁ';
  const statusClass = t.status === 'used' ? 'used' : (t.status === 'paid' ? 'paid' : 'valid');

  const dateStr = t.event_date
    ? new Date(t.event_date).toLocaleDateString('cs-CZ', {weekday:'long', day:'numeric', month:'long', year:'numeric'})
    : '';

  root.innerHTML = `
    <div class="ticket">
      <div class="ticket-stripe"></div>
      <div class="ticket-body">
        <div class="ticket-brand">HEAR ME OUT / VSTUPENKA</div>
        <div class="status-badge ${statusClass}">
          <svg width="7" height="7" viewBox="0 0 8 8"><circle cx="4" cy="4" r="3.5" fill="currentColor"/></svg>
          ${statusLabel}
        </div>
        <div class="ticket-title">${esc(t.event_title)}</div>
        <div class="ticket-meta">
          ${dateStr ? `<div class="ticket-row"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M2 7h12M5 2v2M11 2v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg><span class="val">${dateStr}</span></div>` : ''}
          ${t.event_time ? `<div class="ticket-row"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.4"/><path d="M8 5v3.5l2 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg><span class="val">${esc(t.event_time)}</span></div>` : ''}
          ${t.event_venue ? `<div class="ticket-row"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 2a4 4 0 0 0-4 4c0 3 4 8 4 8s4-5 4-8a4 4 0 0 0-4-4z" stroke="currentColor" stroke-width="1.4"/><circle cx="8" cy="6" r="1.2" fill="currentColor"/></svg><span class="val">${esc(t.event_venue)}${t.event_city ? ', ' + esc(t.event_city) : ''}</span></div>` : (t.event_city ? `<div class="ticket-row"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 2a4 4 0 0 0-4 4c0 3 4 8 4 8s4-5 4-8a4 4 0 0 0-4-4z" stroke="currentColor" stroke-width="1.4"/><circle cx="8" cy="6" r="1.2" fill="currentColor"/></svg><span class="val">${esc(t.event_city)}</span></div>` : '')}
        </div>
      </div>

      <div class="ticket-divider-wrap">
        <div class="notch-l"></div>
        <div class="notch-r"></div>
      </div>

      <div class="ticket-qr-wrap">
        <div id="qrcode"></div>
        <div class="ticket-code">${code}</div>
      </div>

      <div class="ticket-holder">
        <div class="ticket-holder-avatar">${esc((t.holder||'?').slice(0,2).toUpperCase())}</div>
        <div>
          <div class="ticket-holder-name">${esc(t.holder)}</div>
          <div class="ticket-holder-sub">@${esc(t.holder_user)}</div>
        </div>
      </div>
    </div>
    <a href="/events" class="back-link">← Zpět na akce</a>
  `;

  // generate QR
  new QRCode(document.getElementById('qrcode'), {
    text: code,
    width: 180,
    height: 180,
    colorDark: '#e8e8e8',
    colorLight: '#080808',
    correctLevel: QRCode.CorrectLevel.M
  });
}

init();
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
