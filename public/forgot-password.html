<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hear Me Out">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hear Me Out — Reset password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg2:#080808;--bg3:#101010;--bg4:#181818;
  --red:#8b0000;--red2:#b20000;--red3:#cc0000;
  --txt:#e8e8e8;--txt2:#888;--txt3:#444;
  --border:#1a1a1a;--border2:#222;
}
body{background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}

.brand{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:0.2em;color:var(--red2);margin-bottom:4px;text-align:center}
.brand-sub{font-size:10px;color:var(--txt3);letter-spacing:0.15em;text-align:center;margin-bottom:40px}

.card{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border2);padding:32px}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.15em;margin-bottom:8px}
.card-sub{font-size:11px;color:var(--txt2);letter-spacing:0.04em;line-height:1.6;margin-bottom:28px}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.field label{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--txt3)}
.field input{background:var(--bg3);border:1px solid var(--border2);color:var(--txt);font-family:'DM Mono',monospace;font-size:12px;padding:10px 14px;letter-spacing:0.05em;outline:none;transition:border-color 0.2s;width:100%}
.field input::placeholder{color:var(--txt3)}
.field input:focus{border-color:var(--red)}

.submit-btn{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.15em;padding:14px;background:var(--red2);color:white;border:none;cursor:pointer;transition:all 0.15s;width:100%;margin-top:4px}
.submit-btn:hover{background:var(--red3)}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed}

.msg{font-size:11px;letter-spacing:0.04em;padding:10px 14px;margin-bottom:16px;display:none}
.msg.error{color:var(--red3);background:rgba(139,0,0,0.1);border:1px solid rgba(139,0,0,0.3)}
.msg.success{color:#4ade80;background:rgba(74,222,128,0.05);border:1px solid rgba(74,222,128,0.2)}
.msg.visible{display:block}

.back{font-size:10px;color:var(--txt3);letter-spacing:0.08em;text-align:center;margin-top:20px}
.back a{color:var(--txt3);text-decoration:none}
.back a:hover{color:var(--txt2)}
</style>
</head>
<body>

<div class="brand">HEAR ME OUT</div>
<div class="brand-sub">Independent Music Network</div>

<!-- Step 1: request reset -->
<div class="card" id="stepRequest">
  <div class="card-title">Reset password</div>
  <div class="card-sub">Enter the email linked to your account. We'll send you a link to set a new password.</div>
  <div class="msg" id="reqMsg"></div>
  <form onsubmit="requestReset(event)">
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="reqEmail" placeholder="tvuj@email.cz" autocomplete="email" required>
    </div>
    <button class="submit-btn" type="submit" id="reqBtn">SEND RESET LINK</button>
  </form>
  <div class="back"><a href="/login">← Back to sign in</a></div>
</div>

<!-- Step 2: set new password -->
<div class="card" id="stepReset" style="display:none">
  <div class="card-title">New password</div>
  <div class="card-sub">Enter a new password for your account.</div>
  <div class="msg" id="resetMsg"></div>
  <form onsubmit="submitReset(event)">
    <div class="field">
      <label>New password (min. 6 characters)</label>
      <input type="password" id="newPassword" placeholder="••••••" autocomplete="new-password" minlength="6" required>
    </div>
    <div class="field">
      <label>Confirm password</label>
      <input type="password" id="newPassword2" placeholder="••••••" autocomplete="new-password" minlength="6" required>
    </div>
    <button class="submit-btn" type="submit" id="resetBtn">SAVE PASSWORD</button>
  </form>
  <div class="back"><a href="/login">← Back to sign in</a></div>
</div>

<script>
const token = new URLSearchParams(location.search).get('token');

if (token) {
  document.getElementById('stepRequest').style.display = 'none';
  document.getElementById('stepReset').style.display   = 'block';
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type + ' visible';
}

async function requestReset(e) {
  e.preventDefault();
  const btn   = document.getElementById('reqBtn');
  const email = document.getElementById('reqEmail').value;
  btn.disabled = true; btn.textContent = 'SENDING...';
  const res  = await fetch('/api/forgot-password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email})
  });
  const data = await res.json();
  if (data.ok) {
    showMsg('reqMsg', 'If an account with this email exists, we\'ll send you a link. Check your spam folder too.', 'success');
    document.getElementById('reqEmail').disabled = true;
    btn.textContent = 'SENT';
  } else {
    showMsg('reqMsg', data.error || 'Something went wrong', 'error');
    btn.disabled = false; btn.textContent = 'SEND RESET LINK';
  }
}

async function submitReset(e) {
  e.preventDefault();
  const btn  = document.getElementById('resetBtn');
  const pw   = document.getElementById('newPassword').value;
  const pw2  = document.getElementById('newPassword2').value;
  if (pw !== pw2) { showMsg('resetMsg', 'Passwords do not match', 'error'); return; }
  btn.disabled = true; btn.textContent = 'SAVING...';
  const res  = await fetch('/api/reset-password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({token, password: pw})
  });
  const data = await res.json();
  if (data.ok) {
    showMsg('resetMsg', 'Password updated. Redirecting...', 'success');
    btn.textContent = 'SAVED';
    setTimeout(() => window.location.href = '/login', 2000);
  } else {
    showMsg('resetMsg', data.error || 'Something went wrong', 'error');
    btn.disabled = false; btn.textContent = 'SAVE PASSWORD';
  }
}
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
