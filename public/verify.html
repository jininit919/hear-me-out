<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hear Me Out">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Verification — Hear Me Out</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000;--bg2:#080808;--bg3:#101010;--red:#8b0000;--red2:#b20000;--red3:#cc0000;--txt:#e8e8e8;--txt2:#888;--txt3:#444;--border:#1a1a1a;--border2:#222}
body{background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.brand{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:0.2em;color:var(--red2);margin-bottom:4px;text-align:center}
.brand-sub{font-size:10px;color:var(--txt3);letter-spacing:0.15em;text-align:center;margin-bottom:40px}
.card{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border2);padding:32px}
h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.12em;margin-bottom:8px}
.sub{font-size:12px;color:var(--txt2);letter-spacing:0.04em;line-height:1.7;margin-bottom:28px}
.code-inputs{display:flex;gap:8px;justify-content:center;margin-bottom:24px}
.code-inputs input{width:48px;height:58px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.1em;background:var(--bg3);border:1px solid var(--border2);color:var(--txt);outline:none;transition:border-color 0.2s}
.code-inputs input:focus{border-color:var(--red2)}
.submit-btn{width:100%;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.15em;padding:14px;background:var(--red2);color:white;border:none;cursor:pointer;transition:background 0.15s;margin-bottom:16px}
.submit-btn:hover{background:var(--red3)}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed}
.error-msg{font-size:11px;color:var(--red3);letter-spacing:0.04em;padding:10px 14px;background:rgba(139,0,0,0.1);border:1px solid rgba(139,0,0,0.3);display:none;margin-bottom:16px}
.error-msg.visible{display:block}
.resend{font-size:11px;color:var(--txt3);text-align:center;letter-spacing:0.04em}
.resend button{background:none;border:none;color:var(--red2);cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.04em;text-decoration:underline}
.resend button:disabled{color:var(--txt3);cursor:default;text-decoration:none}
.success{text-align:center;display:none}
.success .check{font-size:48px;margin-bottom:16px;color:var(--red2)}
.success p{font-size:13px;color:var(--txt2);letter-spacing:0.04em}
</style>
</head>
<body>

<div class="brand">HEAR ME OUT</div>
<div class="brand-sub">Independent Music Network</div>

<div class="card">
  <div id="verifyForm">
    <h2>Verify your account</h2>
    <p class="sub" id="subText">We sent a 6-digit code to your email. Enter it below. The code is valid for 15 minutes.</p>
    <div class="error-msg" id="errMsg"></div>
    <div class="code-inputs" id="codeInputs">
      <input type="text" maxlength="1" inputmode="numeric" id="c0" oninput="codeInput(0)" onkeydown="codeKey(event,0)">
      <input type="text" maxlength="1" inputmode="numeric" id="c1" oninput="codeInput(1)" onkeydown="codeKey(event,1)">
      <input type="text" maxlength="1" inputmode="numeric" id="c2" oninput="codeInput(2)" onkeydown="codeKey(event,2)">
      <input type="text" maxlength="1" inputmode="numeric" id="c3" oninput="codeInput(3)" onkeydown="codeKey(event,3)">
      <input type="text" maxlength="1" inputmode="numeric" id="c4" oninput="codeInput(4)" onkeydown="codeKey(event,4)">
      <input type="text" maxlength="1" inputmode="numeric" id="c5" oninput="codeInput(5)" onkeydown="codeKey(event,5)">
    </div>
    <button class="submit-btn" id="verifyBtn" onclick="doVerify()">VERIFY</button>
    <div class="resend">
      Didn't receive the code?
      <button id="resendBtn" onclick="resend()">Resend</button>
      <span id="resendTimer"></span>
    </div>
  </div>

  <div class="success" id="successBox">
    <div class="check">✓</div>
    <h2 style="margin-bottom:12px">Account verified</h2>
    <p>Redirecting you to the main page…</p>
  </div>
</div>

<script>
let resendCooldown = 0;

function codeInput(i) {
  const v = document.getElementById('c' + i).value.replace(/\D/g, '');
  document.getElementById('c' + i).value = v;
  if (v && i < 5) document.getElementById('c' + (i+1)).focus();
  if (i === 5 && v) doVerify();
}

function codeKey(e, i) {
  if (e.key === 'Backspace' && !document.getElementById('c' + i).value && i > 0) {
    document.getElementById('c' + (i-1)).focus();
  }
}

function getCode() {
  return [0,1,2,3,4,5].map(i => document.getElementById('c'+i).value).join('');
}

function showError(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.classList.add('visible');
}

async function doVerify() {
  const code = getCode();
  if (code.length < 6) { showError('Enter all 6 digits'); return; }
  const btn = document.getElementById('verifyBtn');
  btn.disabled = true; btn.textContent = 'VERIFYING…';
  document.getElementById('errMsg').classList.remove('visible');

  const res  = await fetch('/api/verify-email', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({code})
  });
  const data = await res.json();
  if (data.ok) {
    document.getElementById('verifyForm').style.display = 'none';
    document.getElementById('successBox').style.display = 'block';
    localStorage.setItem('hmo_new_user', '1');
    setTimeout(() => window.location.href = '/', 1500);
  } else {
    showError(data.error || 'Incorrect code');
    btn.disabled = false; btn.textContent = 'VERIFY';
  }
}

async function resend() {
  if (resendCooldown > 0) return;
  const btn = document.getElementById('resendBtn');
  btn.disabled = true;
  const res  = await fetch('/api/resend-verify', {method:'POST'});
  const data = await res.json();
  if (data.ok) {
    resendCooldown = 60;
    tick();
  } else {
    btn.disabled = false;
  }
}

function tick() {
  const btn   = document.getElementById('resendBtn');
  const timer = document.getElementById('resendTimer');
  if (resendCooldown <= 0) {
    btn.disabled = false;
    timer.textContent = '';
    return;
  }
  timer.textContent = ` (${resendCooldown}s)`;
  resendCooldown--;
  setTimeout(tick, 1000);
}

// Auto-focus first input
document.getElementById('c0').focus();

// Handle paste of full 6-digit code
document.getElementById('codeInputs').addEventListener('paste', e => {
  const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
  if (text.length === 6) {
    e.preventDefault();
    text.split('').forEach((ch, i) => { document.getElementById('c'+i).value = ch; });
    document.getElementById('c5').focus();
    doVerify();
  }
});
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
