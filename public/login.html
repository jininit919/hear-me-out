<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hear Me Out">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hear Me Out — Přihlášení</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg2:#080808;--bg3:#101010;--bg4:#181818;
  --red:#8b0000;--red2:#b20000;--red3:#cc0000;
  --txt:#e8e8e8;--txt2:#888;--txt3:#444;
  --border:#1a1a1a;--border2:#222;
}
body{background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--red)}

.brand{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:0.2em;color:var(--red2);margin-bottom:4px;text-align:center}
.brand-sub{font-size:10px;color:var(--txt3);letter-spacing:0.15em;text-align:center;margin-bottom:40px}

.card{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border2)}

.tabs{display:flex;border-bottom:1px solid var(--border2)}
.tab{flex:1;padding:14px;text-align:center;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt3);cursor:pointer;transition:all 0.15s;border:none;background:none;font-family:'DM Mono',monospace}
.tab.active{color:var(--red2);border-bottom:2px solid var(--red2)}
.tab:hover:not(.active){color:var(--txt2)}

.form{padding:28px;display:none;flex-direction:column;gap:16px}
.form.active{display:flex}

.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--txt3)}
.field input,.field select{background:var(--bg3);border:1px solid var(--border2);color:var(--txt);font-family:'DM Mono',monospace;font-size:12px;padding:10px 14px;letter-spacing:0.05em;outline:none;transition:border-color 0.2s;width:100%}
.field input::placeholder{color:var(--txt3)}
.field input:focus{border-color:var(--red)}

.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.submit-btn{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.15em;padding:14px;background:var(--red2);color:white;border:none;cursor:pointer;transition:all 0.15s;margin-top:4px}
.submit-btn:hover{background:var(--red3)}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed}

.error-msg{font-size:11px;color:var(--red3);letter-spacing:0.04em;padding:10px 14px;background:rgba(139,0,0,0.1);border:1px solid rgba(139,0,0,0.3);display:none}
.error-msg.visible{display:block}

.hint{font-size:9px;color:var(--txt3);letter-spacing:0.04em;line-height:1.6;text-align:center;margin-top:8px}
</style>
</head>
<body>

<div class="brand">HEAR ME OUT</div>
<div class="brand-sub">Underground · CZ / SK Independent Music</div>

<div class="card">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Přihlásit se</button>
    <button class="tab" onclick="switchTab('register')">Registrace</button>
  </div>

  <!-- LOGIN -->
  <form class="form active" id="loginForm" onsubmit="doLogin(event)">
    <div class="error-msg" id="loginError"></div>
    <div class="field">
      <label>Uživatelské jméno</label>
      <input type="text" id="loginUsername" placeholder="username" autocomplete="username" required>
    </div>
    <div class="field">
      <label>Heslo</label>
      <input type="password" id="loginPassword" placeholder="••••••" autocomplete="current-password" required>
    </div>
    <button class="submit-btn" type="submit" id="loginBtn">PŘIHLÁSIT SE</button>
  </form>

  <!-- REGISTER -->
  <form class="form" id="registerForm" onsubmit="doRegister(event)">
    <div class="error-msg" id="registerError"></div>
    <div class="field">
      <label>Uživatelské jméno *</label>
      <input type="text" id="regUsername" placeholder="jen písmena a čísla" autocomplete="username" required>
    </div>
    <div class="field">
      <label>Umělecké jméno / nick *</label>
      <input type="text" id="regDisplayName" placeholder="jak tě bude vidět svět" required>
    </div>
    <div class="field">
      <label>E-mail *</label>
      <input type="email" id="regEmail" placeholder="tvuj@email.cz" autocomplete="email" required>
    </div>
    <div class="field">
      <label>Telefon (nepovinné)</label>
      <input type="tel" id="regPhone" placeholder="+420 xxx xxx xxx" autocomplete="tel">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Město</label>
        <input type="text" id="regCity" placeholder="Praha, Brno...">
      </div>
      <div class="field">
        <label>Žánr(y)</label>
        <input type="text" id="regGenres" placeholder="Hip-Hop, Techno...">
      </div>
    </div>
    <div class="field">
      <label>Heslo * (min. 6 znaků)</label>
      <input type="password" id="regPassword" placeholder="••••••" autocomplete="new-password" required>
    </div>
    <button class="submit-btn" type="submit" id="registerBtn">VYTVOŘIT ÚČET</button>
    <div class="hint">Na e-mail ti pošleme ověřovací kód. Registrací souhlasíš s <a href="/terms" style="color:#555">podmínkami</a>.</div>
  </form>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0) === (tab==='login')));
  document.getElementById('loginForm').classList.toggle('active', tab === 'login');
  document.getElementById('registerForm').classList.toggle('active', tab === 'register');
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('visible');
}
function hideError(id) {
  document.getElementById(id).classList.remove('visible');
}

async function doLogin(e) {
  e.preventDefault();
  hideError('loginError');
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'PŘIHLAŠUJI...';

  const res = await fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      username: document.getElementById('loginUsername').value,
      password: document.getElementById('loginPassword').value
    })
  });
  const data = await res.json();

  if (data.ok) {
    window.location.href = '/';
  } else {
    showError('loginError', data.error || 'Chyba přihlášení');
    btn.disabled = false;
    btn.textContent = 'PŘIHLÁSIT SE';
  }
}

async function doRegister(e) {
  e.preventDefault();
  hideError('registerError');
  const btn = document.getElementById('registerBtn');
  btn.disabled = true;
  btn.textContent = 'REGISTRUJI...';

  const res = await fetch('/api/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      username:     document.getElementById('regUsername').value,
      display_name: document.getElementById('regDisplayName').value,
      email:        document.getElementById('regEmail').value,
      phone:        document.getElementById('regPhone').value,
      city:         document.getElementById('regCity').value,
      genres:       document.getElementById('regGenres').value,
      password:     document.getElementById('regPassword').value
    })
  });
  const data = await res.json();

  if (data.ok) {
    window.location.href = data.verify ? '/verify' : '/';
  } else {
    showError('registerError', data.error || 'Chyba registrace');
    btn.disabled = false;
    btn.textContent = 'VYTVOŘIT ÚČET';
  }
}
</script>

<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
