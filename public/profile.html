<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hear Me Out">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hear Me Out — Profil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/theme.css">
<script src="/theme.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg2:#080808;--bg3:#101010;--bg4:#181818;
  --red:#8b0000;--red2:#b20000;--red3:#cc0000;
  --redglow:rgba(139,0,0,0.12);
  --txt:#e8e8e8;--txt2:#aaaaaa;--txt3:#777777;
  --border:#1a1a1a;--border2:#222;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace;min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--red)}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(14,10,10,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;height:54px;gap:12px}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.15em;color:var(--red2);text-decoration:none}
.nav-logo span{color:var(--txt3);font-size:15px;font-family:'DM Mono',monospace;letter-spacing:0.08em;margin-left:6px;vertical-align:middle}
.nav-back{margin-left:auto;font-size:14px;letter-spacing:0.1em;color:var(--txt3);text-decoration:none;transition:color 0.15s}
.nav-back:hover{color:var(--red2)}

/* PAGE */
.page{max-width:800px;margin:0 auto;padding:70px 24px 60px}

/* PROFILE HEADER */
.profile-header{display:flex;gap:28px;align-items:flex-start;padding:32px 0;border-bottom:1px solid var(--border);margin-bottom:32px}
.avatar-wrap{position:relative;flex-shrink:0}
.avatar-img{width:110px;height:110px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);display:block}
.avatar-placeholder{width:110px;height:110px;border-radius:50%;background:var(--bg3);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--red2)}
.avatar-edit-btn{position:absolute;bottom:4px;right:4px;width:26px;height:26px;border-radius:50%;background:var(--red2);border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:white;transition:background 0.15s}
.avatar-edit-btn:hover{background:var(--red3)}
.avatar-edit-input{position:absolute;inset:0;opacity:0;cursor:pointer;border-radius:50%}

.profile-info{flex:1;min-width:0}
.profile-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.1em;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.pro-badge{display:inline-flex;align-items:center;font-size:9px;letter-spacing:0.12em;background:linear-gradient(90deg,#7a5c1e,#c9a84c);color:#000;padding:2px 7px;font-family:'Bebas Neue',sans-serif;border-radius:1px;line-height:1.4;flex-shrink:0}
.profile-username{font-size:14px;color:var(--txt3);letter-spacing:0.1em;margin-bottom:8px}
.profile-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.profile-tag{font-size:15px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border:1px solid var(--border2);color:var(--txt3)}
.profile-bio{font-size:14px;color:var(--txt2);line-height:1.7;letter-spacing:0.03em;margin-bottom:16px;white-space:pre-wrap}
.profile-bio.empty{color:var(--txt3);font-style:italic}
.profile-stats{display:flex;gap:20px;margin-bottom:16px}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.08em;color:var(--txt)}
.stat-lbl{font-size:15px;color:var(--txt3);letter-spacing:0.1em;text-transform:uppercase}
.profile-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-primary{font-family:'DM Mono',monospace;font-size:14px;letter-spacing:0.1em;text-transform:uppercase;padding:8px 18px;background:var(--red2);color:white;border:none;cursor:pointer;transition:all 0.15s}
.btn-primary:hover{background:var(--red3)}
.btn-secondary{font-family:'DM Mono',monospace;font-size:14px;letter-spacing:0.1em;text-transform:uppercase;padding:8px 18px;background:transparent;color:var(--txt2);border:1px solid var(--border2);cursor:pointer;transition:all 0.15s}
.btn-secondary:hover{border-color:var(--txt3);color:var(--txt)}
.btn-follow{font-family:'DM Mono',monospace;font-size:14px;letter-spacing:0.1em;text-transform:uppercase;padding:8px 18px;border:1px solid var(--red);color:var(--red);background:transparent;cursor:pointer;transition:all 0.15s}
.btn-follow:hover,.btn-follow.following{background:var(--red);color:white}
.btn-msg{font-family:'DM Mono',monospace;font-size:14px;letter-spacing:0.1em;text-transform:uppercase;padding:8px 18px;background:transparent;color:var(--txt2);border:1px solid var(--border2);cursor:pointer;transition:all 0.15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-msg:hover{border-color:var(--txt3);color:var(--txt)}

/* PHOTOS GRID */
.section-title{font-size:15px;letter-spacing:0.15em;text-transform:uppercase;color:var(--txt3);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.photos-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:36px}
.photo-slot{aspect-ratio:1;background:var(--bg3);border:1px solid var(--border2);position:relative;overflow:hidden;cursor:pointer}
.photo-slot img{width:100%;height:100%;object-fit:cover;display:block}
.photo-slot-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--txt3);font-size:20px}
.photo-slot-placeholder span{font-size:15px;letter-spacing:0.08em}
.photo-slot-input{position:absolute;inset:0;opacity:0;cursor:pointer}
.photo-slot-edit{position:absolute;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;gap:8px}
.photo-slot:hover .photo-slot-edit{display:flex}
.photo-edit-btn{font-size:15px;letter-spacing:0.08em;padding:5px 10px;background:var(--red2);color:white;border:none;cursor:pointer}
.photo-remove-btn{font-size:15px;letter-spacing:0.08em;padding:5px 10px;background:var(--bg3);color:var(--txt2);border:1px solid var(--border2);cursor:pointer}

/* TRACKS */
.track-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);cursor:default}
.track-row:last-child{border-bottom:none}
.tr-cover{width:44px;height:44px;background:var(--bg3);border:1px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--red2);overflow:hidden}
.tr-cover img{width:100%;height:100%;object-fit:cover}
.tr-info{flex:1;min-width:0}
.tr-title{font-size:14px;letter-spacing:0.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-meta{font-size:15px;color:var(--txt3);margin-top:3px;letter-spacing:0.06em}
.tr-play{width:32px;height:32px;border-radius:50%;background:var(--red);border:none;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:all 0.15s}
.tr-play:hover{background:var(--red2);transform:scale(1.05)}
.tr-likes{font-size:14px;color:var(--txt3);min-width:40px;text-align:right;letter-spacing:0.04em}
.tr-dur{font-size:15px;color:var(--txt3);min-width:36px;text-align:right;letter-spacing:0.04em}

/* EDIT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:none;align-items:center;justify-content:center;padding:24px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:28px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.12em;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--txt3);font-size:18px;cursor:pointer;transition:color 0.15s}
.modal-close:hover{color:var(--txt)}
.mform{display:flex;flex-direction:column;gap:16px}
.mfield{display:flex;flex-direction:column;gap:6px}
.mfield label{font-size:15px;letter-spacing:0.12em;text-transform:uppercase;color:var(--txt3)}
.mfield input,.mfield textarea{background:var(--bg3);border:1px solid var(--border2);color:var(--txt);font-family:'DM Mono',monospace;font-size:14px;padding:10px 14px;letter-spacing:0.05em;outline:none;transition:border-color 0.2s;width:100%}
.mfield input::placeholder,.mfield textarea::placeholder{color:var(--txt3)}
.mfield input:focus,.mfield textarea:focus{border-color:var(--red)}
.mfield textarea{resize:vertical;min-height:100px;line-height:1.6}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.emoji-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.emoji-opt{width:40px;height:40px;border:1px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all 0.15s;border-radius:2px}
.emoji-opt:hover{border-color:var(--txt3)}
.emoji-opt.active{border-color:var(--red2);background:var(--redglow)}
.emoji-opt.none{font-size:15px;color:var(--txt3);letter-spacing:0.04em}
.avatar-emoji{position:absolute;bottom:2px;right:2px;width:24px;height:24px;border-radius:50%;background:var(--bg);border:1.5px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1;pointer-events:none}
.msave{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.15em;padding:13px;background:var(--red2);color:white;border:none;cursor:pointer;transition:all 0.15s;margin-top:4px}
.msave:hover{background:var(--red3)}
.msave:disabled{opacity:0.5;cursor:not-allowed}
.merror{font-size:15px;color:var(--red3);padding:10px 14px;background:rgba(139,0,0,0.1);border:1px solid rgba(139,0,0,0.3);display:none}
.merror.visible{display:block}

/* NOW PLAYING */
.playing-bar{position:fixed;bottom:0;left:0;right:0;z-index:90;background:rgba(10,6,6,0.98);border-top:1px solid var(--border2);padding:10px 24px;display:none;align-items:center;gap:16px;backdrop-filter:blur(12px)}
.pb-art{width:38px;height:38px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--red2);flex-shrink:0}
.pb-info{flex:0 0 160px;min-width:0}
.pb-title{font-size:15px;letter-spacing:0.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pb-artist{font-size:15px;color:var(--txt3);margin-top:2px}
.pb-controls{display:flex;align-items:center;gap:10px}
.pb-btn{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:15px;padding:4px;transition:color 0.15s}
.pb-btn:hover{color:var(--txt)}
.pb-play{width:32px;height:32px;border-radius:50%;background:var(--red);border:none;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all 0.15s}
.pb-play:hover{background:var(--red2)}
.pb-progress{flex:1;height:3px;background:var(--border2);cursor:pointer}
.pb-progress-fill{height:100%;background:var(--red2);width:0%}
.pb-time{font-size:15px;color:var(--txt3);min-width:90px;text-align:right}

/* TABS */
.profile-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:28px}
.profile-tab{font-size:14px;letter-spacing:0.12em;text-transform:uppercase;padding:10px 20px;cursor:pointer;color:var(--txt3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s}
.profile-tab:hover{color:var(--txt2)}
.profile-tab.active{color:var(--txt);border-bottom-color:var(--red2)}

/* PLAYLIST GRID */
.pl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;margin-bottom:32px}
.pl-card{background:var(--bg3);border:1px solid var(--border2);cursor:pointer;transition:border-color 0.15s;position:relative}
.pl-card:hover{border-color:var(--red2)}
.pl-cover{width:100%;aspect-ratio:1;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--txt3);overflow:hidden;position:relative}
.pl-cover img{width:100%;height:100%;object-fit:cover;display:block}
.pl-card-body{padding:10px 10px 12px}
.pl-card-name{font-size:15px;letter-spacing:0.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.pl-card-meta{font-size:15px;color:var(--txt3);letter-spacing:0.06em;display:flex;align-items:center;gap:6px}
.pl-visibility{font-size:15px;padding:1px 6px;border:1px solid var(--border2);color:var(--txt3);letter-spacing:0.06em}
.pl-add-card{border:1px dashed var(--border2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;cursor:pointer;color:var(--txt3);font-size:14px;letter-spacing:0.08em;min-height:160px;transition:all 0.15s}
.pl-add-card:hover{border-color:var(--red2);color:var(--red2)}

/* PLAYLIST DETAIL */
.pl-detail{margin-bottom:32px}
.pl-detail-header{display:flex;align-items:center;gap:14px;padding:16px 0 20px;border-bottom:1px solid var(--border);margin-bottom:16px}
.pl-detail-cover{width:72px;height:72px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--txt3);flex-shrink:0;overflow:hidden}
.pl-detail-cover img{width:100%;height:100%;object-fit:cover}
.pl-detail-info{flex:1;min-width:0}
.pl-detail-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.1em;margin-bottom:6px}
.pl-detail-meta{font-size:15px;color:var(--txt3);letter-spacing:0.08em;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pl-detail-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.pl-play-btn{font-family:'DM Mono',monospace;font-size:14px;letter-spacing:0.1em;text-transform:uppercase;padding:8px 18px;background:var(--red2);color:white;border:none;cursor:pointer;transition:background 0.15s}
.pl-play-btn:hover{background:var(--red3)}
.pl-btn-sm{font-family:'DM Mono',monospace;font-size:15px;letter-spacing:0.1em;text-transform:uppercase;padding:6px 12px;background:transparent;color:var(--txt3);border:1px solid var(--border2);cursor:pointer;transition:all 0.15s}
.pl-btn-sm:hover{color:var(--txt2);border-color:var(--txt3)}
.pl-btn-sm.danger:hover{color:#c62828;border-color:#c62828}
.pl-back{font-size:14px;letter-spacing:0.08em;color:var(--txt3);cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;transition:color 0.15s}
.pl-back:hover{color:var(--txt2)}
.pl-track-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.pl-track-row:last-child{border-bottom:none}
.pl-track-num{width:20px;font-size:14px;color:var(--txt3);text-align:right;flex-shrink:0}
.pl-track-cover{width:38px;height:38px;background:var(--bg3);border:1px solid var(--border2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--txt3)}
.pl-track-cover img{width:100%;height:100%;object-fit:cover}
.pl-track-info{flex:1;min-width:0}
.pl-track-title{font-size:15px;letter-spacing:0.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-track-meta{font-size:15px;color:var(--txt3);margin-top:2px}
.pl-track-play{width:28px;height:28px;border-radius:50%;background:var(--red);border:none;color:white;cursor:pointer;font-size:14px;flex-shrink:0;transition:all 0.15s}
.pl-track-play:hover{background:var(--red2)}
.pl-track-rm{width:24px;height:24px;background:none;border:none;color:var(--txt3);cursor:pointer;font-size:14px;flex-shrink:0;transition:color 0.15s;display:none}
.pl-track-rm:hover{color:#c62828}
.pl-detail[data-own="true"] .pl-track-rm{display:block}

/* ADD-TO-PLAYLIST DROPDOWN */
.atp-wrap{position:relative;display:inline-block}
.atp-menu{position:absolute;right:0;top:100%;z-index:50;background:var(--bg3);border:1px solid var(--border2);min-width:180px;display:none;flex-direction:column}
.atp-menu.open{display:flex}
.atp-item{padding:9px 14px;font-size:14px;letter-spacing:0.06em;cursor:pointer;white-space:nowrap;transition:background 0.12s;color:var(--txt2)}
.atp-item:hover{background:var(--bg4);color:var(--txt)}
.atp-item.new{color:var(--red2);border-top:1px solid var(--border)}

/* LOADING */
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
.loading{padding:60px;text-align:center;color:var(--txt3);font-size:15px;letter-spacing:0.1em;animation:pulse 1.5s ease infinite}

/* TOAST */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg3);border:1px solid var(--border2);color:var(--txt2);font-size:14px;letter-spacing:0.08em;padding:10px 20px;z-index:300;opacity:0;transition:all 0.2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (max-width:768px) {
  .page{padding:12px 12px 80px}
  .profile-header{flex-direction:column;align-items:center;text-align:center;gap:16px;padding:20px 0}
  .profile-info{width:100%}
  .profile-stats{justify-content:center}
  .profile-actions{justify-content:center}
  .photos-grid{grid-template-columns:repeat(2,1fr)}
  .pl-grid{grid-template-columns:repeat(2,1fr)}
  .mrow{grid-template-columns:1fr}
  .playing-bar{bottom:56px;padding:8px 12px}
  .pb-vol{display:none}
  nav{padding:0 12px}
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">HEAR ME OUT <span>Network</span></a>
  <button id="themeToggle" onclick="toggleTheme()" title="Přepnout motiv" style="margin-left:auto;background:none;border:none;cursor:pointer;font-size:16px;color:var(--txt3);width:34px;height:34px;display:flex;align-items:center;justify-content:center">☀</button>
  <a href="/messages" title="Zprávy" style="position:relative;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--txt3);font-size:17px;text-decoration:none;transition:color 0.15s" onmouseover="this.style.color='var(--red2)'" onmouseout="this.style.color='var(--txt3)'"><svg width="17" height="17" viewBox="0 0 17 17" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 4.5 L10.5 4.5 M8 2 L10.5 4.5 L8 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 12.5 L6.5 12.5 M9 10 L6.5 12.5 L9 15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg><div id="msgBadge" style="display:none;position:absolute;top:4px;right:4px;min-width:14px;height:14px;border-radius:7px;background:var(--red2);border:1.5px solid var(--bg);font-size:9px;color:white;align-items:center;justify-content:center;padding:0 3px"></div></a>
  <a class="nav-back" href="/" style="margin-left:0">← Feed</a>
</nav>

<div class="page" id="page">
  <div class="loading">Načítám profil...</div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">
      Upravit profil
      <button class="modal-close" onclick="closeEdit()">✕</button>
    </div>
    <form class="mform" id="editForm" onsubmit="saveProfile(event)">
      <div class="merror" id="editError"></div>
      <div class="mfield">
        <label>Umělecké jméno *</label>
        <input type="text" id="eName" required>
      </div>
      <div class="mrow">
        <div class="mfield">
          <label>Město</label>
          <div style="display:flex;gap:6px;align-items:center">
            <select id="eCity" style="flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--txt);font-family:'DM Mono',monospace;font-size:15px;padding:8px 10px;letter-spacing:0.05em;outline:none;cursor:pointer" onchange="onCitySelect(this.value)">
              <option value="">— nevybráno —</option>
              <option value="Praha"     data-lat="50.0755" data-lng="14.4378">Praha</option>
              <option value="Brno"      data-lat="49.1951" data-lng="16.6068">Brno</option>

<div class="playing-bar" id="playingBar">
  <div class="pb-art" id="pbArt">—</div>
  <div class="pb-info">
    <div class="pb-title" id="pbTitle">—</div>
    <div class="pb-artist" id="pbArtist">—</div>
  </div>
  <div class="pb-controls">
    <button class="pb-btn" onclick="seekRel(-10)">⟨⟨</button>
    <button class="pb-play" id="pbPlay" onclick="toggleGlobal()">▶</button>
    <button class="pb-btn" onclick="seekRel(10)">⟩⟩</button>
  </div>
  <div class="pb-progress" id="pbProg" onclick="seekClick(event)">
    <div class="pb-progress-fill" id="pbFill"></div>
  </div>

</div>

<div class="toast" id="toast"></div>
<audio id="audioEl" preload="none"></audio>

<script>
const audio    = document.getElementById('audioEl');
const username = location.pathname.split('/').pop();
let profile    = null;
let currentBtn = null;
let currentId  = null;

async function load() {
  const res = await fetch('/api/profile/' + username);
  if (res.status === 401) { window.location.href = '/login'; return; }
  if (!res.ok) { document.getElementById('page').innerHTML = '<div class="loading">Profil nenalezen.</div>'; return; }
  profile = await res.json();
  render();
}

function render() {
  const p = profile;
  const emojiBadge = p.emoji ? `<div class="avatar-emoji">${p.emoji}</div>` : '';
  const avatarHTML = p.avatar
    ? `<img class="avatar-img" src="/uploads/${esc(p.avatar)}" alt="avatar">`
    : `<div class="avatar-placeholder">${esc(p.initials)}</div>`;

  const editBtn = p.is_own
    ? `<button class="btn-secondary" onclick="openEdit()">Upravit profil</button>`
    : `<button class="btn-follow ${p.is_following ? 'following' : ''}" id="followBtn" onclick="toggleFollow()">${p.is_following ? 'Following' : 'Follow'}</button>
       <a class="btn-msg" href="/messages?user=${esc(p.username)}">◻ Zpráva</a>`;

  const tags = [p.city, ...(p.genres ? p.genres.split(',').map(g=>g.trim()) : [])]
    .filter(Boolean).map(t => `<div class="profile-tag">${esc(t)}</div>`).join('');

  const bioHTML = p.bio
    ? `<div class="profile-bio">${esc(p.bio)}</div>`
    : (p.is_own ? `<div class="profile-bio empty">Zatím žádné bio — klikni na "Upravit profil".</div>` : '');

  const photosHTML = p.photos.map((ph, i) => {
    if (ph) {
      return `<div class="photo-slot">
        <img src="/uploads/${esc(ph)}" alt="foto">
        ${p.is_own ? `<div class="photo-slot-edit">
          <label class="photo-edit-btn">Změnit<input type="file" accept="image/*" style="display:none" onchange="uploadPhoto(this,${i+1})"></label>
          <button class="photo-remove-btn" onclick="removePhoto(${i+1})">Smazat</button>
        </div>` : ''}
      </div>`;
    } else {
      return `<div class="photo-slot">
        <div class="photo-slot-placeholder"><span>▣</span><span>${p.is_own ? 'Přidat' : ''}</span></div>
        ${p.is_own ? `<input type="file" class="photo-slot-input" accept="image/*" onchange="uploadPhoto(this,${i+1})">` : ''}
      </div>`;
    }
  }).join('');

  const tracksHTML = p.tracks.length === 0
    ? `<div style="font-size:15px;color:var(--txt3);padding:20px 0">${p.is_own ? 'Zatím žádné tracky — <a href="/upload" style="color:var(--red2);text-decoration:none">nahraj první</a>.' : 'Zatím žádné tracky.'}</div>`
    : p.tracks.map(t => {
        const coverHTML = t.cover
          ? `<div class="tr-cover"><img src="/uploads/${esc(t.cover)}" alt="cover"></div>`
          : `<div class="tr-cover">${esc(p.initials)}</div>`;
        return `<div class="track-row">
          ${coverHTML}
          <div class="tr-info">
            <div class="tr-title">${esc(t.title)}</div>
            <div class="tr-meta">${[t.genre, t.city].filter(Boolean).join(' · ')} · ${esc(t.created_at)}</div>
          </div>
          <button class="tr-play" id="pb-${t.id}"
            data-filename="${escA(t.filename)}" data-title="${escA(t.title)}" data-initials="${escA(p.initials)}"
            data-trackid="${t.id}" onclick="handlePlay(this)">▶</button>
          <div class="tr-likes">♥ ${t.like_count}</div>
          <div class="tr-dur">${esc(t.duration) || '—'}</div>
          <div class="atp-wrap">
            <button class="tr-play" style="background:var(--bg3);border:1px solid var(--border2);color:var(--txt3);font-size:16px" title="Přidat do playlistu" onclick="openAtpMenu(event,${t.id})">+</button>
            <div class="atp-menu" id="atp-${t.id}">
              <div class="atp-item loading-atp">Načítám...</div>
            </div>
          </div>
        </div>`;
      }).join('');

  document.getElementById('page').innerHTML = `
    <div class="profile-header">
      <div class="avatar-wrap">
        ${avatarHTML}
        ${emojiBadge}
        ${p.is_own ? `<label class="avatar-edit-btn" title="Změnit profilovku">✎<input type="file" class="avatar-edit-input" accept="image/*" onchange="uploadAvatar(this)"></label>` : ''}
      </div>
      <div class="profile-info">
        <div class="profile-name">${esc(p.display_name)}${p.pro ? '<span class="pro-badge">★ PRO</span>' : ''}</div>
        <div class="profile-username">@${esc(p.username)}</div>
        <div class="profile-tags">${tags}</div>
        ${bioHTML}
        <div class="profile-stats">
          <div class="stat"><div class="stat-val">${p.track_count}</div><div class="stat-lbl">Tracků</div></div>
          <div class="stat"><div class="stat-val">${p.followers}</div><div class="stat-lbl">Followerů</div></div>
          <div class="stat"><div class="stat-val">${p.following_count}</div><div class="stat-lbl">Sleduje</div></div>
        </div>
        <div class="profile-actions">${editBtn}</div>
      </div>
    </div>

    <div class="section-title">Fotky</div>
    <div class="photos-grid">${photosHTML}</div>

    <div class="profile-tabs">
      <div class="profile-tab active" id="tabTracks"    onclick="switchTab('tracks')">Tracky (${p.track_count})</div>
      <div class="profile-tab"        id="tabPlaylists" onclick="switchTab('playlists')">Playlisty</div>
      <div class="profile-tab"        id="tabReposts"   onclick="switchTab('reposts')">Reposty</div>
      <div class="profile-tab"        id="tabEvents"    onclick="switchTab('events')">Events</div>
      ${p.is_own ? `<div class="profile-tab" id="tabFavorites"   onclick="switchTab('favorites')">Oblíbené</div>
      <div class="profile-tab" id="tabSavedEvents" onclick="switchTab('savedEvents')">Uložené akce</div>
      <div class="profile-tab" id="tabTickets"     onclick="switchTab('tickets')">Vstupenky</div>` : ''}
    </div>

    <div id="tabContentTracks">
      <div id="trackList">${tracksHTML}</div>
    </div>
    <div id="tabContentReposts" style="display:none">
      <div id="repostsView"><div class="loading">Načítám...</div></div>
    </div>
    <div id="tabContentPlaylists" style="display:none">
      <div id="playlistsView"><div class="loading">Načítám...</div></div>
    </div>
    <div id="tabContentEvents" style="display:none">
      <div id="eventsView"><div class="loading">Načítám akce...</div></div>
    </div>
    ${p.is_own ? `<div id="tabContentFavorites" style="display:none">
      <div id="favoritesView"><div class="loading">Načítám...</div></div>
    </div>
    <div id="tabContentSavedEvents" style="display:none">
      <div id="savedEventsView"><div class="loading">Načítám...</div></div>
    </div>
    <div id="tabContentTickets" style="display:none">
      <div id="ticketsView"><div class="loading">Načítám...</div></div>
    </div>` : ''}
  `;

  if (p.is_own) {
    document.getElementById('eName').value    = p.display_name;
    document.getElementById('eGenres').value  = p.genres || '';
    document.getElementById('eBio').value     = p.bio || '';
    document.getElementById('eEmoji').value   = p.emoji || '';
    document.querySelectorAll('.emoji-opt').forEach(el => {
      el.classList.toggle('active', el.dataset.val === (p.emoji || ''));
    });
    // Set city dropdown to saved value (if matches a predefined city)
    const citySelect = document.getElementById('eCity');
    citySelect.value = p.city || '';
    document.getElementById('eLat').value = p.lat || '';
    document.getElementById('eLng').value = p.lng || '';
  }
}

// ── Avatar ────────────────────────────────────────────────────────────────────
async function uploadAvatar(input) {
  if (!input.files[0]) return;
  const form = new FormData();
  form.append('avatar',       input.files[0]);
  form.append('display_name', profile.display_name);
  await fetch('/api/profile/update', {method:'POST', body:form});
  await load();
  showToast('Profilovka uložena');
}

// ── Photos ────────────────────────────────────────────────────────────────────
async function uploadPhoto(input, slot) {
  if (!input.files[0]) return;
  const form = new FormData();
  form.append(`photo${slot}`,  input.files[0]);
  form.append('display_name', profile.display_name);
  await fetch('/api/profile/update', {method:'POST', body:form});
  await load();
  showToast('Foto uloženo');
}

async function removePhoto(slot) {
  const form = new FormData();
  form.append('display_name', profile.display_name);
  form.append(`remove_photo${slot}`, '1');
  await fetch('/api/profile/update', {method:'POST', body:form});
  await load();
  showToast('Foto odstraněno');
}

// ── Emoji picker ──────────────────────────────────────────────────────────────
function pickEmoji(el) {
  document.querySelectorAll('.emoji-opt').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('eEmoji').value = el.dataset.val;
}

// ── City / GPS helpers ────────────────────────────────────────────────────────
function onCitySelect(val) {
  const opt = document.querySelector(`#eCity option[value="${val}"]`);
  if (opt && opt.dataset.lat) {
    document.getElementById('eLat').value = opt.dataset.lat;
    document.getElementById('eLng').value = opt.dataset.lng;
  } else {
    document.getElementById('eLat').value = '';
    document.getElementById('eLng').value = '';
  }
}

function useGpsForProfile() {
  if (!navigator.geolocation) { showToast('GPS není dostupné'); return; }
  const btn = document.getElementById('gpsProfileBtn');
  btn.style.opacity = '0.5';
  navigator.geolocation.getCurrentPosition(pos => {
    document.getElementById('eLat').value = pos.coords.latitude;
    document.getElementById('eLng').value = pos.coords.longitude;
    btn.style.opacity = '1';
    showToast('Poloha získána ✓');
  }, () => {
    btn.style.opacity = '1';
    showToast('GPS zamítnuto nebo nedostupné');
  });
}

// ── Edit modal ────────────────────────────────────────────────────────────────
function openEdit() {
  document.getElementById('editModal').classList.add('open');
}
function closeEdit() {
  document.getElementById('editModal').classList.remove('open');
}
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editModal')) closeEdit();
});

async function saveProfile(e) {
  e.preventDefault();
  const btn = document.getElementById('eSave');
  btn.disabled = true; btn.textContent = 'UKLÁDÁM...';
  document.getElementById('editError').classList.remove('visible');

  const form = new FormData();
  form.append('display_name', document.getElementById('eName').value.trim());
  form.append('city',         document.getElementById('eCity').value.trim());
  form.append('genres',       document.getElementById('eGenres').value.trim());
  form.append('bio',          document.getElementById('eBio').value.trim());
  form.append('emoji',        document.getElementById('eEmoji').value);
  const lat = document.getElementById('eLat').value;
  const lng = document.getElementById('eLng').value;
  if (lat && lng) { form.append('lat', lat); form.append('lng', lng); }

  const res  = await fetch('/api/profile/update', {method:'POST', body:form});
  const data = await res.json();

  if (data.ok) {
    await load();
    closeEdit();
    showToast('Profil uložen');
  } else {
    const el = document.getElementById('editError');
    el.textContent = data.error || 'Chyba';
    el.classList.add('visible');
  }
  btn.disabled = false; btn.textContent = 'ULOŽIT';
}

// ── Follow ────────────────────────────────────────────────────────────────────
async function toggleFollow() {
  const res  = await fetch('/api/follow/' + profile.id, {method:'POST'});
  const data = await res.json();
  if (data.error) return;
  profile.is_following = data.following;
  profile.followers += data.following ? 1 : -1;
  render();
}

// ── Player ────────────────────────────────────────────────────────────────────
function handlePlay(btn) {
  const id  = parseInt(btn.dataset.trackid);
  const fn  = btn.dataset.filename;
  const ti  = btn.dataset.title;
  const ini = btn.dataset.initials;

  if (currentId === id) {
    if (audio.paused) { audio.play(); setPlay(true); }
    else              { audio.pause(); setPlay(false); }
    return;
  }
  if (currentBtn) currentBtn.textContent = '▶';
  audio.pause();
  currentId  = id;
  currentBtn = btn;
  audio.src  = '/uploads/' + fn;
  audio.load();
  audio.play().catch(() => {});
  setPlay(true);
  document.getElementById('pbTitle').textContent  = ti;
  document.getElementById('pbArtist').textContent = profile.display_name;
  document.getElementById('pbArt').textContent    = ini;
  document.getElementById('playingBar').style.display = 'flex';
  fetch('/api/play/' + id, {method:'POST'});
}

function setPlay(p) {
  const ic = p ? '▐▐' : '▶';
  document.getElementById('pbPlay').textContent = ic;
  if (currentBtn) currentBtn.textContent = ic;
}
function toggleGlobal() {
  if (audio.paused) { audio.play(); setPlay(true); }
  else              { audio.pause(); setPlay(false); }
}
function seekRel(s) {
  if (audio.duration) audio.currentTime = Math.max(0, Math.min(audio.duration, audio.currentTime + s));
}
function seekClick(e) {
  if (!audio.duration) return;
  const r = document.getElementById('pbProg').getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
}
function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
}
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const p = audio.currentTime / audio.duration;
  document.getElementById('pbFill').style.width = (p*100) + '%';
  document.getElementById('pbTime').textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
});
// ended handler managed by playlist section below

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
let activeTab = 'tracks';
function switchTab(tab) {
  activeTab = tab;
  const tabs = ['tracks', 'playlists', 'reposts', 'events', 'favorites', 'savedEvents', 'tickets'];
  tabs.forEach(t => {
    const tabEl     = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
    const contentEl = document.getElementById('tabContent' + t.charAt(0).toUpperCase() + t.slice(1));
    if (tabEl)     tabEl.classList.toggle('active', t === tab);
    if (contentEl) contentEl.style.display = t === tab ? '' : 'none';
  });
  if (tab === 'playlists')   loadPlaylists();
  if (tab === 'reposts')     loadReposts();
  if (tab === 'events')      loadProfileEvents();
  if (tab === 'favorites')   loadFavoriteTracks();
  if (tab === 'savedEvents') loadSavedEvents();
  if (tab === 'tickets')     loadTickets();
}

// ── Reposts ───────────────────────────────────────────────────────────────────
async function loadReposts() {
  const el = document.getElementById('repostsView');
  el.innerHTML = '<div class="loading">Načítám...</div>';
  const res = await fetch(`/api/profile/${username}/reposts`);
  const tracks = res.ok ? await res.json() : [];
  if (!tracks.length) {
    el.innerHTML = '<div style="font-size:13px;color:var(--txt3);padding:20px 0">Žádné reposty.</div>';
    return;
  }
  el.innerHTML = tracks.map(t => {
    const av = t.user.avatar
      ? `<img src="${t.user.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
      : t.user.initials;
    return `<div class="track-row" onclick="playTrack('/uploads/${t.filename}','${t.title}','${t.user.display_name}',this)">
      <div class="tr-av">${av}</div>
      <div class="tr-info">
        <div class="tr-title">${t.title}</div>
        <div class="tr-artist">${t.user.display_name}${t.genre ? ' · ' + t.genre : ''}</div>
      </div>
      <div class="tr-likes">♥ ${t.like_count}</div>
    </div>`;
  }).join('');
}

// ── Profile events ────────────────────────────────────────────────────────────
async function loadProfileEvents() {
  const el = document.getElementById('eventsView');
  el.innerHTML = '<div class="loading">Načítám...</div>';
  const res = await fetch(`/api/profile/${username}/events`);
  const evs = res.ok ? await res.json() : [];
  if (!evs.length) {
    el.innerHTML = '<div style="font-size:15px;color:var(--txt3);padding:20px 0">Žádné akce.</div>';
    return;
  }
  const upcoming = evs.filter(e => !e.past);
  const past     = evs.filter(e => e.past);
  let html = '';
  if (upcoming.length) {
    html += `<div style="font-size:15px;letter-spacing:0.12em;color:var(--txt3);text-transform:uppercase;margin-bottom:10px">Nadcházející</div>`;
    html += upcoming.map(renderEventRow).join('');
  }
  if (past.length) {
    html += `<div style="font-size:15px;letter-spacing:0.12em;color:var(--txt3);text-transform:uppercase;margin:18px 0 10px">Proběhlé</div>`;
    html += past.map(renderEventRow).join('');
  }
  el.innerHTML = html;
}

function renderEventRow(e) {
  const d = e.date ? new Date(e.date) : null;
  const dateStr = d ? d.toLocaleDateString('cs-CZ', {day:'numeric', month:'short', year:'numeric'}) : '';
  const photo = e.photo ? `<img src="${e.photo}" style="width:48px;height:48px;object-fit:cover;border-radius:3px;flex-shrink:0">` : `<div style="width:48px;height:48px;background:var(--bg3);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">◷</div>`;
  const tags = [e.genre, e.city].filter(Boolean).map(t => `<span style="font-size:15px;letter-spacing:0.06em;padding:2px 6px;border:1px solid var(--border2);color:var(--txt3)">${esc(t)}</span>`).join('');
  const linkBtn = e.link ? `<a href="${esc(e.link)}" target="_blank" style="font-size:15px;letter-spacing:0.08em;color:var(--red2);text-decoration:none">Více →</a>` : '';
  return `<div style="display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border);opacity:${e.past ? '0.55' : '1'}">
    ${photo}
    <div style="flex:1;min-width:0">
      <div style="font-size:15px;font-weight:600;color:var(--txt1);margin-bottom:3px">${esc(e.title)}</div>
      <div style="font-size:14px;color:var(--txt3);margin-bottom:6px">${dateStr}${e.time ? ' · ' + esc(e.time) : ''}${e.venue ? ' · ' + esc(e.venue) : ''}</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">${tags} ${linkBtn}</div>
    </div>
  </div>`;
}

// ── Favorite tracks ───────────────────────────────────────────────────────────
async function loadFavoriteTracks() {
  const el = document.getElementById('favoritesView');
  if (!el) return;
  el.innerHTML = '<div class="loading">Načítám...</div>';
  const res  = await fetch('/api/favorites/tracks');
  const data = res.ok ? await res.json() : [];
  if (!data.length) {
    el.innerHTML = '<div style="font-size:15px;color:var(--txt3);padding:20px 0">Zatím žádné oblíbené tracky.</div>';
    return;
  }
  el.innerHTML = data.map(t => {
    const cover = t.cover
      ? `<img src="/uploads/${esc(t.cover)}" style="width:44px;height:44px;object-fit:cover">`
      : `<div style="width:44px;height:44px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--red2)">${esc((t.display_name||'?').slice(0,2).toUpperCase())}</div>`;
    return `<div style="display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--border)">
      ${cover}
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;color:var(--txt1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.title)}</div>
        <div style="font-size:14px;color:var(--txt3);margin-top:2px">${esc(t.display_name)}${t.genre ? ' · ' + esc(t.genre) : ''}</div>
      </div>
      <a href="/profile/${esc(t.username)}" style="font-size:15px;letter-spacing:0.08em;color:var(--red2);text-decoration:none">Profil →</a>
    </div>`;
  }).join('');
}

// ── Saved events ──────────────────────────────────────────────────────────────
async function loadTickets() {
  const el = document.getElementById('ticketsView');
  if (!el) return;
  el.innerHTML = '<div class="loading">Načítám...</div>';
  const res = await fetch('/api/my-orders');
  const orders = res.ok ? await res.json() : [];
  const tickets = orders.filter(o => o.item_type === 'ticket' && (o.status === 'paid' || o.status === 'valid' || o.status === 'used'));
  if (!tickets.length) {
    el.innerHTML = '<div style="font-size:15px;color:var(--txt3);padding:20px 0">Zatím žádné vstupenky. <a href="/events" style="color:var(--red2);text-decoration:none">Procházet akce →</a></div>';
    return;
  }
  el.innerHTML = tickets.map(t => {
    const statusColor = t.status === 'used' ? 'var(--txt3)' : '#4ade80';
    const statusLabel = t.status === 'used' ? 'POUŽITÁ' : 'PLATNÁ';
    const date = t.created_at ? new Date(t.created_at).toLocaleDateString('cs-CZ', {day:'numeric', month:'short', year:'numeric'}) : '';
    return `<div style="display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="window.location.href='/ticket/${esc(t.ticket_code)}'">
      <div style="width:44px;height:44px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--txt3);flex-shrink:0">▣</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;color:var(--txt1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">Vstupenka #${esc(t.ticket_code)}</div>
        <div style="font-size:14px;color:var(--txt3);margin-top:2px">${t.amount > 0 ? t.amount+' '+esc(t.currency) : ''}${date ? ' · '+date : ''}</div>
      </div>
      <span style="font-size:9px;letter-spacing:0.1em;padding:2px 7px;background:rgba(74,222,128,0.08);color:${statusColor};flex-shrink:0">${statusLabel}</span>
    </div>`;
  }).join('');
}

async function loadSavedEvents() {
  const el = document.getElementById('savedEventsView');
  if (!el) return;
  el.innerHTML = '<div class="loading">Načítám...</div>';
  const res  = await fetch('/api/calendar');
  const data = res.ok ? await res.json() : [];
  if (!data.length) {
    el.innerHTML = '<div style="font-size:15px;color:var(--txt3);padding:20px 0">Zatím žádné uložené akce. <a href="/events" style="color:var(--red2);text-decoration:none">Procházet akce →</a></div>';
    return;
  }
  const upcoming = data.filter(e => !e.past);
  const past     = data.filter(e => e.past);
  let html = '';
  if (upcoming.length) {
    html += `<div style="font-size:15px;letter-spacing:0.12em;color:var(--txt3);text-transform:uppercase;margin-bottom:10px">Nadcházející</div>`;
    html += upcoming.map(renderSavedEvent).join('');
  }
  if (past.length) {
    html += `<div style="font-size:15px;letter-spacing:0.12em;color:var(--txt3);text-transform:uppercase;margin:18px 0 10px">Proběhlé</div>`;
    html += past.map(renderSavedEvent).join('');
  }
  el.innerHTML = html;
}

function renderSavedEvent(e) {
  const d = e.date ? new Date(e.date) : null;
  const dateStr = d ? d.toLocaleDateString('cs-CZ', {day:'numeric', month:'short', year:'numeric'}) : '';
  return `<div style="display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);opacity:${e.past ? '0.55' : '1'}">
    <div style="width:44px;height:44px;background:var(--bg3);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">◷</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:14px;color:var(--txt1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.title)}</div>
      <div style="font-size:14px;color:var(--txt3);margin-top:2px">${dateStr}${e.city ? ' · ' + esc(e.city) : ''}${e.genre ? ' · ' + esc(e.genre) : ''}</div>
    </div>
    <a href="/events" style="font-size:15px;letter-spacing:0.08em;color:var(--red2);text-decoration:none">Detail →</a>
  </div>`;
}

// ── Playlists ─────────────────────────────────────────────────────────────────
let playlists = [];
let activePl  = null;    // currently open playlist detail
let plQueue   = [];      // tracks queued for playlist playback
let plQueueIdx = -1;

async function loadPlaylists() {
  const res = await fetch(`/api/profile/${username}/playlists`);
  playlists = res.ok ? await res.json() : [];
  renderPlaylistGrid();
}

function renderPlaylistGrid() {
  const el = document.getElementById('playlistsView');
  if (!el) return;
  const addCard = profile.is_own
    ? `<div class="pl-add-card" onclick="openPlModal()"><span style="font-size:24px">+</span><span>Nový playlist</span></div>`
    : '';
  if (!playlists.length && !profile.is_own) {
    el.innerHTML = '<div style="font-size:15px;color:var(--txt3);padding:20px 0">Žádné veřejné playlisty.</div>';
    return;
  }
  el.innerHTML = `<div class="pl-grid">
    ${playlists.map(pl => `
      <div class="pl-card" onclick="openPlDetail(${pl.id})">
        <div class="pl-cover">
          ${pl.cover ? `<img src="/uploads/${esc(pl.cover)}" loading="lazy">` : '♫'}
        </div>
        <div class="pl-card-body">
          <div class="pl-card-name">${esc(pl.name)}</div>
          <div class="pl-card-meta">
            <span>${pl.track_count} tracků</span>
            <span class="pl-visibility">${pl.is_public ? '🌐' : '🔒'}</span>
          </div>
        </div>
      </div>`).join('')}
    ${addCard}
  </div>`;
}

async function openPlDetail(id) {
  const res = await fetch(`/api/playlists/${id}`);
  if (!res.ok) return;
  activePl = await res.json();
  renderPlDetail();
}

function renderPlDetail() {
  const pl = activePl;
  const el = document.getElementById('playlistsView');
  const cover = pl.tracks.find(t => t.cover)?.cover;
  const coverHTML = cover ? `<img src="/uploads/${esc(cover)}">` : '♫';
  const ownActions = pl.is_own ? `
    <button class="pl-btn-sm" onclick="openPlModal(${pl.id})">✎ Přejmenovat</button>
    <button class="pl-btn-sm" onclick="togglePlPublic(${pl.id})">${pl.is_public ? '🔒 Soukromý' : '🌐 Veřejný'}</button>
    <button class="pl-btn-sm danger" onclick="deletePl(${pl.id})">Smazat</button>` : '';

  el.innerHTML = `
    <div class="pl-back" onclick="backToGrid()">← Zpět na playlisty</div>
    <div class="pl-detail" data-own="${pl.is_own}">
      <div class="pl-detail-header">
        <div class="pl-detail-cover">${coverHTML}</div>
        <div class="pl-detail-info">
          <div class="pl-detail-name">${esc(pl.name)}</div>
          <div class="pl-detail-meta">
            <span>${pl.tracks.length} tracků</span>
            <span>${pl.is_public ? '🌐 Veřejný' : '🔒 Soukromý'}</span>
          </div>
          <div class="pl-detail-actions">
            ${pl.tracks.length ? `<button class="pl-play-btn" onclick="playPlaylist()">▶ Přehrát vše</button>` : ''}
            ${ownActions}
          </div>
        </div>
      </div>
      <div id="plTrackList">
        ${pl.tracks.length === 0
          ? `<div style="font-size:15px;color:var(--txt3);padding:16px 0">Playlist je prázdný. Přidej tracky pomocí + na záložce Tracky.</div>`
          : pl.tracks.map((t, i) => `
            <div class="pl-track-row">
              <div class="pl-track-num">${i + 1}</div>
              <div class="pl-track-cover">${t.cover ? `<img src="/uploads/${esc(t.cover)}">` : '♪'}</div>
              <div class="pl-track-info">
                <div class="pl-track-title">${esc(t.title)}</div>
                <div class="pl-track-meta">${esc(t.display_name)}${t.genre ? ' · ' + esc(t.genre) : ''}</div>
              </div>
              <div class="tr-dur" style="font-size:14px;color:var(--txt3)">${esc(t.duration) || '—'}</div>
              <button class="pl-track-play" id="plpb-${t.id}"
                data-trackid="${t.id}" data-filename="${escA(t.filename)}"
                data-title="${escA(t.title)}" data-initials="${escA((t.display_name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase())}"
                data-plindex="${i}" onclick="handlePlPlay(this)">▶</button>
              <button class="pl-track-rm" onclick="removeFromPl(${pl.id},${t.id})" title="Odebrat">✕</button>
            </div>`).join('')}
      </div>
    </div>`;
}

function backToGrid() {
  activePl = null;
  renderPlaylistGrid();
}

function playPlaylist() {
  if (!activePl || !activePl.tracks.length) return;
  plQueue    = activePl.tracks;
  plQueueIdx = 0;
  playPlTrack(0);
}

function handlePlPlay(btn) {
  const idx = parseInt(btn.dataset.plindex);
  plQueue    = activePl.tracks;
  plQueueIdx = idx;
  playPlTrack(idx);
}

function playPlTrack(idx) {
  const t   = plQueue[idx];
  const btn = document.getElementById(`plpb-${t.id}`);
  const ini = (t.display_name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();

  if (currentBtn) currentBtn.textContent = '▶';
  audio.pause();
  currentId  = t.id;
  currentBtn = btn;

  audio.src = '/uploads/' + t.filename;
  audio.load();
  audio.play().catch(() => {});
  setPlay(true);

  document.getElementById('pbTitle').textContent  = t.title;
  document.getElementById('pbArtist').textContent = t.display_name;
  document.getElementById('pbArt').textContent    = ini;
  document.getElementById('playingBar').style.display = 'flex';
  fetch('/api/play/' + t.id, {method:'POST'});
}

// auto-advance playlist
audio.addEventListener('ended', () => {
  if (plQueue.length && plQueueIdx < plQueue.length - 1) {
    plQueueIdx++;
    playPlTrack(plQueueIdx);
  } else {
    setPlay(false);
  }
});

async function togglePlPublic(id) {
  const pl = playlists.find(p => p.id === id) || activePl;
  const newVal = pl ? !pl.is_public : true;
  await fetch(`/api/playlists/${id}`, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({is_public: newVal})});
  await loadPlaylists();
  if (activePl && activePl.id === id) { activePl.is_public = newVal; renderPlDetail(); }
  showToast(newVal ? 'Playlist je nyní veřejný' : 'Playlist je nyní soukromý');
}

async function deletePl(id) {
  if (!confirm('Smazat playlist?')) return;
  await fetch(`/api/playlists/${id}`, {method:'DELETE'});
  activePl = null;
  await loadPlaylists();
  showToast('Playlist smazán');
}

// ── Create / edit playlist modal ──────────────────────────────────────────────
let editingPlId = null;
let plIsPublic  = true;

function setPlVis(pub) {
  plIsPublic = pub;
  const pubBtn  = document.getElementById('plPublic');
  const privBtn = document.getElementById('plPrivate');
  if (pub) {
    pubBtn.style.background  = 'var(--red2)'; pubBtn.style.borderColor  = 'var(--red2)'; pubBtn.style.color  = 'white';
    privBtn.style.background = 'transparent'; privBtn.style.borderColor = 'var(--border2)'; privBtn.style.color = 'var(--txt3)';
  } else {
    privBtn.style.background = 'var(--red2)'; privBtn.style.borderColor = 'var(--red2)'; privBtn.style.color  = 'white';
    pubBtn.style.background  = 'transparent'; pubBtn.style.borderColor  = 'var(--border2)'; pubBtn.style.color = 'var(--txt3)';
  }
}

function openPlModal(id) {
  editingPlId = id || null;
  document.getElementById('plModalTitle').textContent = id ? 'Upravit playlist' : 'Nový playlist';
  document.getElementById('plSaveBtn').textContent    = id ? 'ULOŽIT' : 'VYTVOŘIT';
  if (id) {
    const pl = playlists.find(p => p.id === id) || activePl;
    if (pl) {
      document.getElementById('plName').value = pl.name;
      setPlVis(pl.is_public);
    }
  } else {
    document.getElementById('plName').value = '';
    setPlVis(true);
  }
  document.getElementById('plError').classList.remove('visible');
  document.getElementById('plModal').classList.add('open');
  setTimeout(() => document.getElementById('plName').focus(), 50);
}

function closePlModal() {
  document.getElementById('plModal').classList.remove('open');
}

async function savePlModal() {
  const name      = document.getElementById('plName').value.trim();
  const is_public = plIsPublic;
  if (!name) {
    document.getElementById('plError').textContent = 'Název je povinný';
    document.getElementById('plError').classList.add('visible');
    return;
  }
  if (editingPlId) {
    await fetch(`/api/playlists/${editingPlId}`, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, is_public})});
    showToast('Playlist upraven');
  } else {
    await fetch('/api/playlists', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, is_public})});
    showToast('Playlist vytvořen');
  }
  closePlModal();
  await loadPlaylists();
  if (editingPlId && activePl?.id === editingPlId) { activePl.name = name; activePl.is_public = is_public; renderPlDetail(); }
}

document.getElementById('plModal').addEventListener('click', e => {
  if (e.target === document.getElementById('plModal')) closePlModal();
});

// ── Add to playlist dropdown ───────────────────────────────────────────────────
let atpTrackId = null;

async function openAtpMenu(e, trackId) {
  e.stopPropagation();
  // close any open menus
  document.querySelectorAll('.atp-menu.open').forEach(m => m.classList.remove('open'));
  atpTrackId = trackId;
  const menu = document.getElementById(`atp-${trackId}`);
  menu.classList.add('open');

  // fetch own playlists
  const res = await fetch(`/api/profile/${username}/playlists`);
  const pls = res.ok ? await res.json() : [];
  menu.innerHTML = pls.map(pl =>
    `<div class="atp-item" onclick="atpAdd(${pl.id},${trackId})">${esc(pl.name)} <span style="color:var(--txt3)">(${pl.track_count})</span></div>`
  ).join('') + `<div class="atp-item new" onclick="atpNew(${trackId})">+ Nový playlist</div>`;
}

async function atpAdd(plId, trackId) {
  document.querySelectorAll('.atp-menu.open').forEach(m => m.classList.remove('open'));
  const res  = await fetch(`/api/playlists/${plId}/tracks`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({track_id: trackId})});
  const data = await res.json();
  showToast(data.error ? data.error : 'Přidáno do playlistu');
  loadPlaylists();
}

async function atpNew(trackId) {
  document.querySelectorAll('.atp-menu.open').forEach(m => m.classList.remove('open'));
  const name = prompt('Název nového playlistu:');
  if (!name?.trim()) return;
  const res  = await fetch('/api/playlists', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name: name.trim(), is_public: true})});
  const data = await res.json();
  if (data.ok) {
    await fetch(`/api/playlists/${data.id}/tracks`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({track_id: trackId})});
    showToast('Playlist vytvořen a track přidán');
    loadPlaylists();
  }
}

async function removeFromPl(plId, trackId) {
  await fetch(`/api/playlists/${plId}/tracks/${trackId}`, {method:'DELETE'});
  showToast('Odebráno z playlistu');
  await openPlDetail(plId);
}

// close ATP on outside click
document.addEventListener('click', () => {
  document.querySelectorAll('.atp-menu.open').forEach(m => m.classList.remove('open'));
});

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escA(s) { return esc(s); }

async function pollUnread() {
  try {
    const data = await fetch('/api/messages/unread').then(r => r.json());
    const badge = document.getElementById('msgBadge');
    if (badge) {
      if (data.count > 0) {
        badge.textContent = data.count > 9 ? '9+' : data.count;
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }
    }
  } catch {}
  setTimeout(pollUnread, 15000);
}

load().then(() => pollUnread());
</script>
