<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hear Me Out">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hear Me Out — Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/theme.css">
<script src="/theme.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg2:#080808;--bg3:#101010;--bg4:#181818;
  --red:#8b0000;--red2:#b20000;--red3:#cc0000;--redglow:rgba(139,0,0,0.12);
  --txt:#e8e8e8;--txt2:#888;--txt3:#444;
  --border:#1a1a1a;--border2:#222;
}
body{background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace;min-height:100vh}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--red)}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(0,0,0,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;height:54px;gap:16px}
.nav-brand{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.15em;color:var(--red2)}
.nav-title{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--txt3)}
.nav-back{margin-left:auto;font-size:10px;letter-spacing:0.08em;color:var(--txt3);transition:color 0.15s}
.nav-back:hover{color:var(--red2)}

.page{max-width:820px;margin:0 auto;padding:74px 24px 80px}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border2);margin-bottom:28px;gap:0}
.tab{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;padding:10px 20px;cursor:pointer;color:var(--txt3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--txt2)}
.tab.active{color:var(--txt);border-bottom-color:var(--red2)}

/* TRACK ROW */
.track-row{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s}
.track-row:last-child{border-bottom:none}
.track-row:hover{background:var(--bg2);margin:0 -12px;padding:11px 12px}
.track-cover{width:42px;height:42px;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--txt3);overflow:hidden}
.track-cover img{width:100%;height:100%;object-fit:cover}
.track-info{flex:1;min-width:0}
.track-title{font-size:13px;letter-spacing:0.03em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.track-sub{font-size:11px;color:var(--txt3);margin-top:3px;letter-spacing:0.03em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.track-action{font-size:10px;letter-spacing:0.08em;color:var(--red2);flex-shrink:0;opacity:0;transition:opacity 0.15s}
.track-row:hover .track-action{opacity:1}

/* PLAYLIST GRID */
.pl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.pl-card{background:var(--bg2);border:1px solid var(--border2);cursor:pointer;transition:border-color 0.15s;overflow:hidden}
.pl-card:hover{border-color:var(--red)}
.pl-cover{width:100%;aspect-ratio:1;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--txt3);overflow:hidden}
.pl-cover img{width:100%;height:100%;object-fit:cover}
.pl-body{padding:10px 12px 12px}
.pl-name{font-size:12px;letter-spacing:0.04em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.pl-meta{font-size:10px;color:var(--txt3);letter-spacing:0.04em}
.pl-add-card{background:none;border:1px dashed var(--border2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--txt3);transition:border-color 0.15s;font-size:11px;letter-spacing:0.06em;min-height:180px}
.pl-add-card:hover{border-color:var(--red2);color:var(--red2)}

/* PLAYLIST DETAIL */
.pl-detail{display:none}
.pl-detail.open{display:block}
.pl-detail-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border2)}
.pl-detail-back{font-size:10px;letter-spacing:0.08em;color:var(--txt3);cursor:pointer;transition:color 0.15s;margin-bottom:16px;display:inline-flex;align-items:center;gap:4px}
.pl-detail-back:hover{color:var(--red2)}
.pl-detail-cover{width:80px;height:80px;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--txt3);overflow:hidden}
.pl-detail-cover img{width:100%;height:100%;object-fit:cover}
.pl-detail-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.1em}
.pl-detail-meta{font-size:11px;color:var(--txt3);margin-top:4px}
.pl-play-btn{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:0.12em;background:var(--red2);color:#fff;border:none;cursor:pointer;padding:8px 18px;margin-top:10px;transition:background 0.15s}
.pl-play-btn:hover{background:var(--red3)}

/* OFFLINE badge */
.offline-badge{font-size:9px;letter-spacing:0.1em;background:rgba(74,222,128,0.12);color:#4ade80;padding:2px 6px;flex-shrink:0}

.empty{font-size:12px;color:var(--txt3);letter-spacing:0.04em;padding:32px 0;text-align:center;line-height:1.8}
.empty a{color:var(--red2)}
.loading{font-size:12px;color:var(--txt3);padding:32px 0;text-align:center}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);padding:28px;width:340px;max-width:92vw}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.1em;margin-bottom:16px}
.modal-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--txt);font-family:'DM Mono',monospace;font-size:13px;padding:9px 12px;outline:none;transition:border-color 0.2s;margin-bottom:12px;letter-spacing:0.04em}
.modal-input:focus{border-color:var(--red)}
.modal-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:12px;color:var(--txt2);letter-spacing:0.04em}
.modal-row input[type=checkbox]{accent-color:var(--red2)}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.modal-btn{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:0.12em;padding:8px 18px;border:none;cursor:pointer;transition:background 0.15s}
.modal-btn.primary{background:var(--red2);color:#fff}
.modal-btn.primary:hover{background:var(--red3)}
.modal-btn.cancel{background:var(--bg3);color:var(--txt3)}
.modal-btn.cancel:hover{color:var(--txt)}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">HEAR ME OUT</a>
  <div class="nav-title">Knihovna</div>
  <a href="/" class="nav-back">← Feed</a>
</nav>

<div class="page">
  <div class="tabs">
    <div class="tab active" id="tabLiked" onclick="switchTab('liked')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 13.5S2 9.5 2 5.5A3.5 3.5 0 0 1 8 3.2 3.5 3.5 0 0 1 14 5.5c0 4-6 8-6 8z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      Liked
    </div>
    <div class="tab" id="tabOffline" onclick="switchTab('offline')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 3v7M5 8l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Offline
    </div>
    <div class="tab" id="tabPlaylists" onclick="switchTab('playlists')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="1.5" rx="0.75" fill="currentColor"/><rect x="2" y="7" width="12" height="1.5" rx="0.75" fill="currentColor"/><rect x="2" y="11" width="8" height="1.5" rx="0.75" fill="currentColor"/></svg>
      Playlisty
    </div>
    <div class="tab" id="tabTickets" onclick="switchTab('tickets')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 5.5h12M2 5.5v5a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-5M2 5.5V4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1.5M6 5.5v5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Vstupenky
    </div>
  </div>

  <div id="viewLiked"></div>
  <div id="viewOffline" style="display:none"></div>
  <div id="viewPlaylists" style="display:none"></div>
  <div id="viewTickets" style="display:none"></div>
</div>

<!-- Playlist modal -->
<div class="modal-bg" id="plModal">
  <div class="modal">
    <div class="modal-title" id="plModalTitle">New playlist</div>
    <input class="modal-input" id="plModalName" placeholder="Playlist name">
    <div class="modal-row"><input type="checkbox" id="plModalPublic" checked><label for="plModalPublic">Public playlist</label></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closePlModal()">Cancel</button>
      <button class="modal-btn primary" onclick="savePl()">Save</button>
    </div>
  </div>
</div>

<script>
function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }

let currentTab = 'liked';
let playlists = [];
let activePl = null;
let plQueue = [];
let plQueueIdx = -1;
let editingPlId = null;

// IndexedDB helpers
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open('hearmeout', 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('tracks', {keyPath:'id'});
    r.onsuccess = e => res(e.target.result);
    r.onerror   = () => rej(r.error);
  });
}
async function idbGetAll() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('tracks','readonly');
    const req = tx.objectStore('tracks').getAll();
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}
async function idbDelete(id) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('tracks','readwrite');
    tx.objectStore('tracks').delete(id);
    tx.oncomplete = res;
    tx.onerror    = () => rej(tx.error);
  });
}

function switchTab(tab) {
  currentTab = tab;
  ['liked','offline','playlists','tickets'].forEach(t => {
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active', t===tab);
    document.getElementById('view'+t.charAt(0).toUpperCase()+t.slice(1)).style.display = t===tab ? '' : 'none';
  });
  if (tab === 'liked')      loadLiked();
  if (tab === 'offline')    loadOffline();
  if (tab === 'playlists')  loadPlaylists();
  if (tab === 'tickets')    loadTickets();
}

// ── Liked tracks ──────────────────────────────────────────────────────────────
async function loadLiked() {
  const el = document.getElementById('viewLiked');
  el.innerHTML = '<div class="loading">Loading...</div>';
  const res = await fetch('/api/favorites/tracks');
  if (res.status === 401) { window.location.href = '/login'; return; }
  const data = res.ok ? await res.json() : [];
  if (!data.length) {
    el.innerHTML = '<div class="empty">No liked tracks yet.<br>Add ♥ from the <a href="/">feed</a>.</div>';
    return;
  }
  el.innerHTML = data.map(t => {
    const cover = t.cover
      ? `<img src="/uploads/${esc(t.cover)}">`
      : `<span>♪</span>`;
    return `<div class="track-row" onclick="playLiked(${t.id}, '${esc(t.filename)}', '${esc(t.title)}', '${esc(t.display_name)}')">
      <div class="track-cover">${cover}</div>
      <div class="track-info">
        <div class="track-title">${esc(t.title)}</div>
        <div class="track-sub">${esc(t.display_name)}${t.genre ? ' · '+esc(t.genre) : ''}</div>
      </div>
      <a href="/profile/${esc(t.username)}" onclick="event.stopPropagation()" class="track-action">Profil →</a>
    </div>`;
  }).join('');
}

function playLiked(id, filename, title, artist) {
  // Open in feed — deeplink
  window.location.href = '/?play=' + id;
}

// ── Offline tracks ────────────────────────────────────────────────────────────
async function loadOffline() {
  const el = document.getElementById('viewOffline');
  el.innerHTML = '<div class="loading">Loading...</div>';
  const tracks = await idbGetAll();
  if (!tracks.length) {
    el.innerHTML = '<div class="empty">No offline tracks.<br>Tap ⬇ on a track in the feed to save it.</div>';
    return;
  }
  el.innerHTML = tracks.map(t => {
    const coverSrc = t.coverBlob ? URL.createObjectURL(t.coverBlob) : null;
    const cover = coverSrc ? `<img src="${coverSrc}">` : `<span>♪</span>`;
    return `<div class="track-row" onclick="playOffline(${t.id})">
      <div class="track-cover">${cover}</div>
      <div class="track-info">
        <div class="track-title">${esc(t.title)}</div>
        <div class="track-sub">${esc(t.artist)}</div>
      </div>
      <span class="offline-badge">OFFLINE</span>
      <button onclick="event.stopPropagation();removeOffline(${t.id})" style="background:none;border:none;color:var(--txt3);cursor:pointer;font-size:13px;padding:4px 6px;flex-shrink:0">✕</button>
    </div>`;
  }).join('');
}

let offlineAudio = new Audio();
async function playOffline(id) {
  const db = await openDB();
  const t = await new Promise((res, rej) => {
    const tx = db.transaction('tracks','readonly');
    const req = tx.objectStore('tracks').get(id);
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
  if (!t) return;
  offlineAudio.pause();
  offlineAudio.src = URL.createObjectURL(t.audioBlob);
  offlineAudio.load();
  offlineAudio.play().catch(()=>{});
}

async function removeOffline(id) {
  await idbDelete(id);
  loadOffline();
}

// ── Playlists ─────────────────────────────────────────────────────────────────
async function loadPlaylists() {
  const el = document.getElementById('viewPlaylists');
  if (activePl) { renderPlDetail(); return; }
  el.innerHTML = '<div class="loading">Loading...</div>';
  const res = await fetch('/api/playlists');
  if (res.status === 401) { window.location.href = '/login'; return; }
  playlists = res.ok ? await res.json() : [];
  renderPlGrid();
}

function renderPlGrid() {
  const el = document.getElementById('viewPlaylists');
  el.innerHTML = `
    <div class="pl-grid">
      ${playlists.map(pl => `
        <div class="pl-card" onclick="openPlDetail(${pl.id})">
          <div class="pl-cover">${pl.cover ? `<img src="/uploads/${esc(pl.cover)}">` : '♫'}</div>
          <div class="pl-body">
            <div class="pl-name">${esc(pl.name)}</div>
            <div class="pl-meta">${pl.track_count} tracks · ${pl.is_public ? 'Public' : 'Private'}</div>
          </div>
        </div>`).join('')}
      <div class="pl-add-card" onclick="openPlModal()">
        <span style="font-size:24px">+</span>
        <span>New playlist</span>
      </div>
    </div>`;
}

async function openPlDetail(id) {
  activePl = id;
  const el = document.getElementById('viewPlaylists');
  el.innerHTML = '<div class="loading">Loading...</div>';
  const res = await fetch(`/api/playlists/${id}`);
  if (!res.ok) { activePl = null; renderPlGrid(); return; }
  const pl = await res.json();
  const cover = pl.cover ? `<img src="/uploads/${esc(pl.cover)}">` : '♫';
  const tracks = pl.tracks || [];
  el.innerHTML = `
    <div class="pl-detail-back" onclick="closePlDetail()">← Back to playlists</div>
    <div class="pl-detail-header">
      <div class="pl-detail-cover">${cover}</div>
      <div>
        <div class="pl-detail-name">${esc(pl.name)}</div>
        <div class="pl-detail-meta">${tracks.length} tracks · ${pl.is_public ? 'Public' : 'Private'}</div>
        ${tracks.length ? `<button class="pl-play-btn" onclick="playAllPl(${id})">▶ Play all</button>` : ''}
      </div>
    </div>
    <div id="plTrackList">
      ${tracks.length ? tracks.map((t, i) => `
        <div class="track-row" onclick="playPlTrack(${i}, ${JSON.stringify(tracks).replace(/</g,'\\u003c')})">
          <div class="track-cover">${t.cover ? `<img src="/uploads/${esc(t.cover)}">` : '<span>♪</span>'}</div>
          <div class="track-info">
            <div class="track-title">${esc(t.title)}</div>
            <div class="track-sub">${esc(t.display_name||'')}${t.genre?' · '+esc(t.genre):''}</div>
          </div>
          <button onclick="event.stopPropagation();removeFromPl(${id},${t.id})" style="background:none;border:none;color:var(--txt3);cursor:pointer;font-size:13px;padding:4px 6px;flex-shrink:0">✕</button>
        </div>`).join('') : '<div class="empty">Playlist is empty.<br>Add tracks from the feed via the track menu.</div>'}
    </div>`;
}

function closePlDetail() {
  activePl = null;
  renderPlGrid();
}

function playPlTrack(idx, tracks) {
  window.location.href = '/?play=' + tracks[idx].id;
}

function playAllPl(id) {
  // navigate to feed and play first track
  fetch(`/api/playlists/${id}`).then(r=>r.json()).then(pl => {
    if (pl.tracks && pl.tracks.length) window.location.href = '/?play=' + pl.tracks[0].id;
  });
}

async function removeFromPl(plId, trackId) {
  await fetch(`/api/playlists/${plId}/tracks/${trackId}`, {method:'DELETE'});
  openPlDetail(plId);
}

// Playlist modal
function openPlModal(id) {
  editingPlId = id || null;
  document.getElementById('plModalTitle').textContent = id ? 'Edit playlist' : 'New playlist';
  if (id) {
    const pl = playlists.find(p => p.id === id);
    document.getElementById('plModalName').value = pl ? pl.name : '';
    document.getElementById('plModalPublic').checked = pl ? pl.is_public : true;
  } else {
    document.getElementById('plModalName').value = '';
    document.getElementById('plModalPublic').checked = true;
  }
  document.getElementById('plModal').classList.add('open');
  document.getElementById('plModalName').focus();
}

function closePlModal() {
  document.getElementById('plModal').classList.remove('open');
}

async function savePl() {
  const name = document.getElementById('plModalName').value.trim();
  if (!name) return;
  const is_public = document.getElementById('plModalPublic').checked;
  if (editingPlId) {
    await fetch(`/api/playlists/${editingPlId}`, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, is_public})});
  } else {
    await fetch('/api/playlists', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, is_public})});
  }
  closePlModal();
  const res = await fetch('/api/playlists');
  playlists = res.ok ? await res.json() : [];
  renderPlGrid();
}

document.getElementById('plModal').addEventListener('click', e => {
  if (e.target === document.getElementById('plModal')) closePlModal();
});
document.getElementById('plModalName').addEventListener('keydown', e => {
  if (e.key === 'Enter') savePl();
  if (e.key === 'Escape') closePlModal();
});

// ── Tickets ───────────────────────────────────────────────────────────────────
async function loadTickets() {
  const el = document.getElementById('viewTickets');
  el.innerHTML = '<div class="loading">Loading...</div>';
  const res = await fetch('/api/my-orders');
  if (res.status === 401) { window.location.href = '/login'; return; }
  const orders = res.ok ? await res.json() : [];
  const tickets = orders.filter(o => o.item_type === 'ticket' && (o.status === 'paid' || o.status === 'valid' || o.status === 'used'));
  if (!tickets.length) {
    el.innerHTML = '<div class="empty">No tickets yet.<br>Buy a ticket at an <a href="/events">event</a>.</div>';
    return;
  }
  el.innerHTML = tickets.map(t => {
    const statusColor = t.status === 'used' ? 'var(--txt3)' : '#4ade80';
    const statusLabel = t.status === 'used' ? 'USED' : 'VALID';
    const date = t.created_at ? new Date(t.created_at).toLocaleDateString('cs-CZ', {day:'numeric', month:'short', year:'numeric'}) : '';
    return `<div class="track-row" onclick="window.location.href='/ticket/${esc(t.ticket_code)}'">
      <div class="track-cover" style="background:var(--bg3);font-size:18px;color:var(--txt3)">▣</div>
      <div class="track-info">
        <div class="track-title">Vstupenka #${esc(t.ticket_code)}</div>
        <div class="track-sub">${t.amount > 0 ? t.amount+' '+esc(t.currency) : 'Zdarma'}${date ? ' · '+date : ''}</div>
      </div>
      <span style="font-size:9px;letter-spacing:0.1em;padding:2px 7px;border-radius:1px;background:rgba(74,222,128,0.08);color:${statusColor};flex-shrink:0">${statusLabel}</span>
    </div>`;
  }).join('');
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadLiked();
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
