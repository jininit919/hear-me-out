<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hear Me Out — Page not found</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#e8e8e8;font-family:'DM Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.code{font-family:'Bebas Neue',sans-serif;font-size:120px;line-height:1;letter-spacing:0.05em;color:#1a1a1a;margin-bottom:-16px}
.brand{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.2em;color:#b20000;margin-bottom:8px}
.msg{font-size:12px;color:#555;letter-spacing:0.08em;margin-bottom:40px;line-height:1.7}
.btn{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:0.15em;padding:14px 32px;background:#b20000;color:#fff;text-decoration:none;display:inline-block;transition:background 0.15s}
.btn:hover{background:#cc0000}
</style>
</head>
<body>
<div class="code">404</div>
<div class="brand">HEAR ME OUT</div>
<div class="msg">This page doesn't exist or has been moved.</div>
<a href="/" class="btn">BACK TO FEED</a>
</body>
</html>
