<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hear Me Out">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hear Me Out тАФ Messages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg2:#080808;--bg3:#101010;--bg4:#181818;
  --red:#8b0000;--red2:#b20000;--red3:#cc0000;
  --redglow:rgba(139,0,0,0.12);
  --txt:#e8e8e8;--txt2:#888;--txt3:#444;
  --border:#1a1a1a;--border2:#222;
}
html,body{height:100%}
body{background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--red)}

/* NAV */
nav{flex-shrink:0;position:sticky;top:0;z-index:100;background:rgba(14,10,10,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;height:54px;gap:12px}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.15em;color:var(--red2);text-decoration:none}
.nav-logo span{color:var(--txt3);font-size:11px;font-family:'DM Mono',monospace;letter-spacing:0.08em;margin-left:6px;vertical-align:middle}
.nav-back{margin-left:auto;font-size:10px;letter-spacing:0.1em;color:var(--txt3);text-decoration:none;transition:color 0.15s}
.nav-back:hover{color:var(--red2)}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;max-width:900px;width:100%;margin:0 auto}

/* CONVERSATIONS LIST */
.conv-panel{width:280px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.conv-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.conv-header-title{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--txt3)}
.new-msg-btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:5px 12px;border:1px solid var(--red);color:var(--red);background:transparent;cursor:pointer;transition:all 0.15s}
.new-msg-btn:hover{background:var(--red);color:white}
.conv-search{padding:10px 16px;border-bottom:1px solid var(--border)}
.conv-search input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--txt);font-family:'DM Mono',monospace;font-size:11px;padding:7px 12px;outline:none;transition:border-color 0.2s;letter-spacing:0.05em}
.conv-search input::placeholder{color:var(--txt3)}
.conv-search input:focus{border-color:var(--red)}
.conv-list{overflow-y:auto;flex:1}
.conv-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s}
.conv-item:hover{background:var(--bg2)}
.conv-item.active{background:var(--redglow);border-left:2px solid var(--red2)}
.conv-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--red2);flex-shrink:0;overflow:hidden}
.conv-avatar img{width:100%;height:100%;object-fit:cover}
.conv-info{flex:1;min-width:0}
.conv-name{font-size:11px;letter-spacing:0.04em;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-preview{font-size:10px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0.03em}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.conv-time{font-size:9px;color:var(--txt3)}
.conv-unread{width:18px;height:18px;border-radius:50%;background:var(--red2);display:flex;align-items:center;justify-content:center;font-size:9px;color:white}
.conv-empty{padding:40px 16px;text-align:center;color:var(--txt3);font-size:11px;letter-spacing:0.06em;line-height:1.8}

/* CHAT PANEL */
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--txt3);gap:12px}
.chat-empty .icon{font-size:40px;opacity:0.2}
.chat-empty p{font-size:11px;letter-spacing:0.06em;line-height:1.8;text-align:center}
.chat-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--red2);flex-shrink:0;overflow:hidden;text-decoration:none}
.chat-avatar img{width:100%;height:100%;object-fit:cover}
.chat-name{font-size:12px;letter-spacing:0.05em}
.chat-name a{color:var(--txt);text-decoration:none;transition:color 0.15s}
.chat-name a:hover{color:var(--red2)}
.chat-messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
.msg-row{display:flex;gap:8px;align-items:flex-end}
.msg-row.mine{flex-direction:row-reverse}
.msg-bubble{max-width:72%;padding:9px 14px;font-size:11px;letter-spacing:0.03em;line-height:1.6;position:relative}
.msg-bubble.theirs{background:var(--bg3);border:1px solid var(--border2);border-radius:0 8px 8px 8px}
.msg-bubble.mine{background:var(--red);color:white;border-radius:8px 0 8px 8px}
.msg-time{font-size:9px;color:var(--txt3);flex-shrink:0;margin-bottom:2px}
.msg-avatar{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:10px;color:var(--red2);flex-shrink:0;overflow:hidden}
.msg-avatar img{width:100%;height:100%;object-fit:cover}

/* INPUT */
.chat-input-bar{padding:10px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;flex-shrink:0;position:relative}
.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--txt);font-family:'DM Mono',monospace;font-size:12px;padding:10px 14px;outline:none;transition:border-color 0.2s;resize:none;max-height:120px;line-height:1.5;letter-spacing:0.03em}
.chat-input::placeholder{color:var(--txt3)}
.chat-input:focus{border-color:var(--red)}
.input-btn{width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);color:var(--txt3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all 0.15s}
.input-btn:hover{border-color:var(--red);color:var(--txt)}
.input-btn.active{border-color:var(--red);color:var(--red2);background:var(--bg4)}
.send-btn{width:36px;height:36px;background:var(--red2);border:none;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:background 0.15s}
.send-btn:hover{background:var(--red3)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed}
/* EMOJI PICKER */
.emoji-picker{display:none;flex-wrap:wrap;gap:2px;padding:10px;background:var(--bg2);border:1px solid var(--border2);max-height:160px;overflow-y:auto}
.emoji-picker.open{display:flex}
.emoji-btn{font-size:20px;cursor:pointer;padding:4px;border-radius:3px;line-height:1;transition:background 0.1s;background:none;border:none}
.emoji-btn:hover{background:var(--bg4)}
/* IMAGE preview in input */
.img-preview-bar{display:none;align-items:center;gap:10px;padding:6px 0}
.img-preview-bar.visible{display:flex}
.img-preview-thumb{width:48px;height:48px;object-fit:cover;border:1px solid var(--border2)}
.img-preview-name{font-size:10px;color:var(--txt3);letter-spacing:0.04em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.img-preview-remove{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:14px;padding:0;line-height:1}
.img-preview-remove:hover{color:var(--red3)}
/* IMAGE in bubble */
.msg-image{max-width:220px;max-height:220px;display:block;cursor:pointer;border-radius:2px}
.msg-image:hover{opacity:0.9}

/* NEW MESSAGE MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:none;align-items:center;justify-content:center;padding:24px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);width:100%;max-width:400px;padding:24px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.12em;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--txt3);font-size:18px;cursor:pointer}
.modal-close:hover{color:var(--txt)}
.mfield{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.mfield label{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--txt3)}
.mfield input{background:var(--bg3);border:1px solid var(--border2);color:var(--txt);font-family:'DM Mono',monospace;font-size:12px;padding:10px 14px;letter-spacing:0.05em;outline:none;transition:border-color 0.2s;width:100%}
.mfield input::placeholder{color:var(--txt3)}
.mfield input:focus{border-color:var(--red)}
.modal-btn{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:0.12em;padding:12px;background:var(--red2);color:white;border:none;cursor:pointer;width:100%;transition:all 0.15s}
.modal-btn:hover{background:var(--red3)}
.modal-err{font-size:10px;color:var(--red3);margin-bottom:10px;display:none}
.modal-err.visible{display:block}

@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
.loading{padding:40px;text-align:center;color:var(--txt3);font-size:11px;animation:pulse 1.5s ease infinite}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">HEAR ME OUT <span>Network</span></a>
  <a href="/messages" title="Messages" style="position:relative;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--red2);font-size:17px;text-decoration:none"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><div id="msgBadge" style="display:none;position:absolute;top:4px;right:4px;min-width:14px;height:14px;border-radius:7px;background:var(--red2);border:1.5px solid var(--bg);font-size:9px;color:white;align-items:center;justify-content:center;padding:0 3px"></div></a>
  <a class="nav-back" href="/">тЖР Back</a>
</nav>

<div class="layout">

  <!-- CONVERSATIONS -->
  <div class="conv-panel">
    <div class="conv-header">
      <span class="conv-header-title">Messages</span>
      <button class="new-msg-btn" onclick="openNewMsg()">+ New</button>
    </div>
    <div class="conv-search">
      <input type="text" id="convSearch" placeholder="Search conversations...">
    </div>
    <div class="conv-list" id="convList">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-panel" id="chatPanel">
    <div class="chat-empty" id="chatEmpty">
      <div class="icon">тЧ╗</div>
      <p>Select a conversation<br>or start a new message.</p>
    </div>
  </div>

</div>

<!-- NEW MESSAGE MODAL -->
<div class="modal-overlay" id="newMsgModal">
  <div class="modal">
    <div class="modal-title">
      New message
      <button class="modal-close" onclick="closeNewMsg()">тЬХ</button>
    </div>
    <div class="modal-err" id="newMsgErr"></div>
    <div class="mfield">
      <label>Recipient username</label>
      <input type="text" id="newMsgUser" placeholder="username">
    </div>
    <button class="modal-btn" onclick="startConversation()">OPEN CONVERSATION</button>
  </div>
</div>

<script>
let myId        = null;
let myInitials  = '';
let myAvatar    = '';
let activeUserId = null;
let allConvs    = [];
let pollTimer   = null;

async function init() {
  const res = await fetch('/api/me');
  if (!res.ok) { window.location.href = '/login'; return; }
  const me = await res.json();
  myId       = me.id;
  myInitials = (me.display_name || '??').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  myAvatar   = me.avatar_url || '';

  await loadConversations();

  // open conversation from URL param
  const params = new URLSearchParams(location.search);
  const targetUser = params.get('user');
  if (targetUser) {
    openByUsername(targetUser);
  }

  document.getElementById('convSearch').addEventListener('input', e => filterConvs(e.target.value));
}

// тФАтФА Conversations тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
async function loadConversations() {
  const res  = await fetch('/api/messages/conversations');
  allConvs   = await res.json();
  renderConvs(allConvs);
}

function renderConvs(convs) {
  const el = document.getElementById('convList');
  if (!convs.length) {
    el.innerHTML = '<div class="conv-empty">No conversations yet.<br>Start a new message.</div>';
    return;
  }
  el.innerHTML = convs.map(c => {
    const avatarHTML = c.avatar
      ? `<div class="conv-avatar"><img src="/uploads/${esc(c.avatar)}" alt=""></div>`
      : `<div class="conv-avatar">${esc(c.initials)}</div>`;
    return `<div class="conv-item ${activeUserId === c.user_id ? 'active' : ''}" onclick="openChat(${c.user_id}, '${escJs(c.display_name)}', '${escJs(c.initials)}', '${escJs(c.avatar || '')}', '${escJs(c.username)}')">
      ${avatarHTML}
      <div class="conv-info">
        <div class="conv-name">${esc(c.display_name)}</div>
        <div class="conv-preview">${esc(c.last_msg)}</div>
      </div>
      <div class="conv-meta">
        <div class="conv-time">${esc(c.last_at)}</div>
        ${c.unread > 0 ? `<div class="conv-unread">${c.unread}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function filterConvs(q) {
  const filtered = allConvs.filter(c =>
    c.display_name.toLowerCase().includes(q.toLowerCase()) ||
    c.username.toLowerCase().includes(q.toLowerCase())
  );
  renderConvs(filtered);
}

// тФАтФА Open chat тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
async function openChat(userId, name, ini, avatar, username) {
  activeUserId = userId;
  clearTimeout(pollTimer);

  // mark active in list
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  event && event.currentTarget && event.currentTarget.classList.add('active');

  const panel = document.getElementById('chatPanel');
  panel.innerHTML = `
    <div class="chat-header">
      <a class="chat-avatar" href="/profile/${esc(username)}">
        ${avatar ? `<img src="/uploads/${esc(avatar)}" alt="">` : esc(ini)}
      </a>
      <div class="chat-name"><a href="/profile/${esc(username)}">${esc(name)}</a></div>
    </div>
    <div class="chat-messages" id="chatMessages"><div class="loading">Loading...</div></div>
    <div class="chat-input-bar">
      <div class="emoji-picker" id="emojiPicker">${buildEmojiPicker()}</div>
      <div class="img-preview-bar" id="imgPreviewBar">
        <img class="img-preview-thumb" id="imgPreviewThumb" src="" alt="">
        <div class="img-preview-name" id="imgPreviewName"></div>
        <button class="img-preview-remove" onclick="clearPhoto()" title="Remove">тЬХ</button>
      </div>
      <div class="chat-input-row">
        <button class="input-btn" id="emojiToggleBtn" onclick="toggleEmoji()" title="Emoji">ЁЯШК</button>
        <label class="input-btn" title="Send photo" style="cursor:pointer">
          ЁЯУ╖<input type="file" id="photoInput" accept="image/*" style="display:none" onchange="onPhotoSelected(this)">
        </label>
        <textarea class="chat-input" id="chatInput" placeholder="Write a message..." rows="1" onkeydown="inputKeydown(event)"></textarea>
        <button class="send-btn" onclick="sendMsg()" id="sendBtn">тЖС</button>
      </div>
    </div>`;

  // auto-resize textarea
  document.getElementById('chatInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  await fetchMessages(userId);
  pollMessages(userId);
}

async function openByUsername(username) {
  const res = await fetch('/api/profile/' + username);
  if (!res.ok) return;
  const u = await res.json();
  // add to conv list if not there
  if (!allConvs.find(c => c.user_id === u.id)) {
    allConvs.unshift({
      user_id: u.id, username: u.username,
      display_name: u.display_name, avatar: u.avatar,
      initials: u.initials, last_msg: '', last_at: '', unread: 0
    });
    renderConvs(allConvs);
  }
  openChat(u.id, u.display_name, u.initials, u.avatar || '', u.username);
}

async function fetchMessages(userId) {
  const res  = await fetch('/api/messages/' + userId);
  const data = await res.json();
  if (data.error) return;

  const el = document.getElementById('chatMessages');
  if (!el) return;

  if (!data.messages.length) {
    el.innerHTML = '<div style="text-align:center;color:var(--txt3);font-size:10px;padding:20px 0;letter-spacing:0.06em">No messages yet ЁЯСЛ</div>';
    return;
  }

  el.innerHTML = data.messages.map(m => {
    const avatarHTML = m.mine
      ? `<div class="msg-avatar">${myAvatar ? `<img src="${myAvatar}" alt="">` : esc(myInitials)}</div>`
      : (data.other.avatar
          ? `<div class="msg-avatar"><img src="/uploads/${esc(data.other.avatar)}" alt=""></div>`
          : `<div class="msg-avatar">${esc(data.other.initials)}</div>`);
    const bubbleContent = m.content_type === 'image' && m.image
      ? `<img class="msg-image" src="/uploads/${esc(m.image)}" alt="foto" onclick="openImgFull(this.src)">`
      : esc(m.content);
    return `<div class="msg-row ${m.mine ? 'mine' : ''}">
      ${avatarHTML}
      <div>
        <div class="msg-bubble ${m.mine ? 'mine' : 'theirs'}" style="${m.content_type==='image'?'padding:4px;background:transparent;border:none':''}">${bubbleContent}</div>
        <div class="msg-time" style="${m.mine ? 'text-align:right' : ''}">${esc(m.created_at)}</div>
      </div>
    </div>`;
  }).join('');

  el.scrollTop = el.scrollHeight;

  // update conv list unread
  await loadConversations();
}

function pollMessages(userId) {
  pollTimer = setTimeout(async () => {
    if (activeUserId === userId) {
      await fetchMessages(userId);
      pollMessages(userId);
    }
  }, 4000);
}

// тФАтФА Send тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
let selectedPhoto = null;

async function sendMsg() {
  if (!activeUserId) return;
  const input = document.getElementById('chatInput');
  const btn   = document.getElementById('sendBtn');
  const text  = input.value.trim();

  if (!text && !selectedPhoto) return;
  btn.disabled = true;

  if (selectedPhoto) {
    const form = new FormData();
    form.append('image', selectedPhoto);
    await fetch('/api/messages/' + activeUserId, {method: 'POST', body: form});
    clearPhoto();
  }
  if (text) {
    await fetch('/api/messages/' + activeUserId, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({content: text})
    });
    input.value = '';
    input.style.height = 'auto';
  }

  btn.disabled = false;
  closeEmoji();
  await fetchMessages(activeUserId);
}

function inputKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

// тФАтФА Emoji picker тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
const EMOJIS = ['ЁЯША','ЁЯШВ','ЁЯе╣','ЁЯШН','ЁЯдй','ЁЯШО','ЁЯе╢','ЁЯШн','ЁЯШд','ЁЯдм','ЁЯЩП','ЁЯСК','тЬМя╕П','ЁЯСА','ЁЯФе','ЁЯТп','тЭдя╕П','ЁЯЦд','ЁЯТА','ЁЯС╗','ЁЯО╡','ЁЯОз','ЁЯОд','ЁЯО╕','ЁЯеБ','ЁЯО╣','ЁЯО╢','ЁЯПЖ','ЁЯТ░','ЁЯТО','ЁЯН║','ЁЯЪА','тЪб','ЁЯМЩ','тШАя╕П','ЁЯМК','ЁЯЗиЁЯЗ┐','ЁЯЗ╕ЁЯЗ░'];

function buildEmojiPicker() {
  return EMOJIS.map(e =>
    `<button class="emoji-btn" onclick="insertEmoji('${e}')" type="button">${e}</button>`
  ).join('');
}

function toggleEmoji() {
  const p = document.getElementById('emojiPicker');
  const b = document.getElementById('emojiToggleBtn');
  if (!p) return;
  const open = p.classList.toggle('open');
  b.classList.toggle('active', open);
}

function closeEmoji() {
  const p = document.getElementById('emojiPicker');
  const b = document.getElementById('emojiToggleBtn');
  if (p) p.classList.remove('open');
  if (b) b.classList.remove('active');
}

function insertEmoji(emoji) {
  const input = document.getElementById('chatInput');
  if (!input) return;
  const pos = input.selectionStart;
  input.value = input.value.slice(0, pos) + emoji + input.value.slice(input.selectionEnd);
  input.selectionStart = input.selectionEnd = pos + emoji.length;
  input.focus();
}

// тФАтФА Photo тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function onPhotoSelected(input) {
  const file = input.files[0];
  if (!file) return;
  selectedPhoto = file;
  const bar   = document.getElementById('imgPreviewBar');
  const thumb = document.getElementById('imgPreviewThumb');
  const name  = document.getElementById('imgPreviewName');
  bar.classList.add('visible');
  thumb.src = URL.createObjectURL(file);
  name.textContent = file.name;
  input.value = '';
}

function clearPhoto() {
  selectedPhoto = null;
  const bar = document.getElementById('imgPreviewBar');
  if (bar) bar.classList.remove('visible');
}

function openImgFull(src) {
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:999;display:flex;align-items:center;justify-content:center;cursor:zoom-out';
  ov.onclick = () => ov.remove();
  const img = document.createElement('img');
  img.src = src;
  img.style.cssText = 'max-width:90vw;max-height:90vh;object-fit:contain';
  ov.appendChild(img);
  document.body.appendChild(ov);
}

// тФАтФА New message modal тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function openNewMsg() {
  document.getElementById('newMsgModal').classList.add('open');
  document.getElementById('newMsgUser').value = '';
  document.getElementById('newMsgErr').classList.remove('visible');
  setTimeout(() => document.getElementById('newMsgUser').focus(), 50);
}
function closeNewMsg() {
  document.getElementById('newMsgModal').classList.remove('open');
}
document.getElementById('newMsgModal').addEventListener('click', e => {
  if (e.target === document.getElementById('newMsgModal')) closeNewMsg();
});

async function startConversation() {
  const username = document.getElementById('newMsgUser').value.trim().toLowerCase();
  if (!username) return;
  const err = document.getElementById('newMsgErr');
  err.classList.remove('visible');

  const res = await fetch('/api/profile/' + username);
  if (!res.ok) {
    err.textContent = 'User not found';
    err.classList.add('visible');
    return;
  }
  const u = await res.json();
  if (u.id === myId) {
    err.textContent = "You can't message yourself";
    err.classList.add('visible');
    return;
  }
  closeNewMsg();
  if (!allConvs.find(c => c.user_id === u.id)) {
    allConvs.unshift({
      user_id: u.id, username: u.username,
      display_name: u.display_name, avatar: u.avatar,
      initials: u.initials, last_msg: '', last_at: '', unread: 0
    });
    renderConvs(allConvs);
  }
  openChat(u.id, u.display_name, u.initials, u.avatar || '', u.username);
}

// тФАтФА Utils тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escJs(s) {
  if (s == null) return '';
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

async function pollUnread() {
  try {
    const data = await fetch('/api/messages/unread').then(r => r.json());
    const badge = document.getElementById('msgBadge');
    if (badge) {
      if (data.count > 0) {
        badge.textContent = data.count > 9 ? '9+' : data.count;
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }
    }
  } catch {}
  setTimeout(pollUnread, 15000);
}

init().then(() => pollUnread());
