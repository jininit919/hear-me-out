<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hear Me Out">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hear Me Out — Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/theme.css">
<script src="/theme.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg2:#080808;--bg3:#101010;--bg4:#181818;
  --red:#8b0000;--red2:#b20000;--red3:#cc0000;
  --redglow:rgba(139,0,0,0.12);
  --txt:#e8e8e8;--txt2:#aaaaaa;--txt3:#777777;
  --border:#1a1a1a;--border2:#222;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#7c3aed}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(14,10,10,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;height:54px;gap:0}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.15em;color:var(--red2);margin-right:32px;cursor:pointer;text-decoration:none}
.nav-logo span{color:var(--txt3);font-size:15px;font-family:'DM Mono',monospace;letter-spacing:0.08em;margin-left:6px;vertical-align:middle}
.nav-links{display:flex;gap:4px}
.nav-link{font-size:14px;letter-spacing:0.1em;color:var(--txt3);text-decoration:none;padding:6px 12px;transition:color 0.15s;border-radius:2px}
.nav-link:hover{color:var(--txt)}
.nav-link.active{color:var(--red2)}
.nav-icons{display:flex;gap:6px;margin-left:auto;align-items:center}
.nav-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt3);font-size:15px;border-radius:2px;transition:all 0.15s;text-decoration:none}
.nav-icon:hover{color:var(--red2);background:var(--bg3)}
.nav-avatar{width:30px;height:30px;border-radius:50%;background:var(--bg4);border:1.5px solid var(--red);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--red2);cursor:pointer;margin-left:4px;letter-spacing:0.05em;text-decoration:none}
.msg-badge{position:absolute;top:4px;right:4px;min-width:14px;height:14px;border-radius:7px;background:var(--red2);border:1.5px solid var(--bg);font-size:14px;color:white;display:none;align-items:center;justify-content:center;padding:0 3px}

/* PAGE */
.page{padding-top:54px;min-height:100vh;display:flex;flex-direction:column}


/* CALENDAR HEADER */
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 28px 14px;border-bottom:1px solid var(--border)}
.cal-month{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.12em;color:var(--txt)}
.cal-nav{display:flex;gap:8px;align-items:center}
.cal-nav-btn{background:none;border:1px solid var(--border2);color:var(--txt3);width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all 0.15s;font-family:'DM Mono',monospace}
.cal-nav-btn:hover{border-color:var(--red);color:var(--red2)}
.cal-today-btn{font-family:'DM Mono',monospace;font-size:15px;letter-spacing:0.1em;text-transform:uppercase;padding:5px 12px;border:1px solid var(--border2);color:var(--txt3);background:none;cursor:pointer;transition:all 0.15s}
.cal-today-btn:hover{border-color:var(--red);color:var(--red2)}

/* CALENDAR GRID */
.cal-grid-wrap{flex:1;padding:0 16px 80px;overflow-x:auto}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--border);border-top:1px solid var(--border);min-width:700px}
.cal-day-header{padding:8px 10px;font-size:15px;letter-spacing:0.12em;text-transform:uppercase;color:var(--txt3);border-right:1px solid var(--border);border-bottom:1px solid var(--border);text-align:center;background:var(--bg2)}
.cal-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:110px;padding:6px;position:relative;vertical-align:top;background:var(--bg)}
.cal-cell:hover{background:var(--bg2)}
.cal-cell.other-month{background:var(--bg2)}
.cal-cell.other-month .cal-day-num{color:var(--txt3)}
.cal-cell.today{background:rgba(139,0,0,0.06)}
.cal-cell.today .cal-day-num{color:var(--red2);font-weight:bold}
.cal-day-num{font-size:15px;color:var(--txt2);margin-bottom:4px;letter-spacing:0.04em}
.cal-event{font-size:15px;letter-spacing:0.04em;padding:2px 6px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-radius:2px;transition:opacity 0.15s;color:#fff}
.cal-event:hover{opacity:0.85}
.cal-more{font-size:15px;color:var(--txt3);padding:1px 4px;letter-spacing:0.04em;cursor:pointer}
.cal-more:hover{color:var(--txt)}

/* ADD BUTTON */
.add-bar{position:fixed;bottom:24px;right:24px;z-index:500}
.add-btn{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:0.12em;padding:12px 22px;background:var(--red);color:white;border:none;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.2s;box-shadow:0 4px 20px rgba(139,0,0,0.4)}
.add-btn:hover{background:var(--red2);transform:translateY(-2px)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:28px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.12em;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--txt3);font-size:18px;cursor:pointer;transition:color 0.15s}
.modal-close:hover{color:var(--txt)}

/* FORM */
.mfield{margin-bottom:16px}
.mfield label{display:block;font-size:15px;letter-spacing:0.12em;text-transform:uppercase;color:var(--txt3);margin-bottom:6px}
.mfield input,.mfield textarea,.mfield select{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--txt);font-family:'DM Mono',monospace;font-size:14px;padding:9px 12px;letter-spacing:0.04em;outline:none;transition:border-color 0.2s}
.mfield input:focus,.mfield textarea:focus,.mfield select:focus{border-color:var(--red)}
.mfield textarea{resize:vertical;min-height:70px}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.msave{width:100%;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:0.15em;padding:12px;background:var(--red);color:white;border:none;cursor:pointer;margin-top:8px;transition:background 0.2s}
.msave:hover{background:var(--red2)}
.msave:disabled{opacity:0.5;cursor:default}
.merror{color:#e57373;font-size:14px;letter-spacing:0.06em;margin-bottom:12px;display:none}
.merror.visible{display:block}

/* EVENT DETAIL MODAL */
.detail-genre-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}
.detail-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;font-size:15px;color:var(--txt2);letter-spacing:0.04em}
.detail-row .icon{color:var(--txt3);flex-shrink:0;width:14px;text-align:center}
.detail-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:0.1em;margin-bottom:16px;line-height:1.1}
.detail-delete{font-family:'DM Mono',monospace;font-size:15px;letter-spacing:0.1em;text-transform:uppercase;padding:6px 14px;border:1px solid #c62828;color:#c62828;background:transparent;cursor:pointer;transition:all 0.15s;margin-top:16px}
.detail-delete:hover{background:#c62828;color:white}
.detail-save-btn{display:block;width:100%;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.12em;padding:12px;border:1px solid var(--border2);color:var(--txt2);background:transparent;cursor:pointer;transition:all 0.15s;margin-top:16px;text-align:center}
.detail-save-btn:hover{border-color:var(--red2);color:var(--red2)}
.detail-save-btn.saved{border-color:var(--red2);color:var(--red2);background:rgba(139,0,0,0.08)}
.detail-link{color:var(--red2);text-decoration:none;font-size:15px;letter-spacing:0.04em;word-break:break-all}
.detail-link:hover{text-decoration:underline}
.detail-user{display:flex;align-items:center;gap:8px;padding:10px 0;border-top:1px solid var(--border);margin-top:14px}
.detail-avatar{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--red2);flex-shrink:0}
.detail-user-name{font-size:15px;letter-spacing:0.05em}
.detail-user-sub{font-size:15px;color:var(--txt3);margin-top:2px;letter-spacing:0.06em}

/* PHOTO UPLOAD */
.photo-upload-area{display:block;border:1px dashed var(--border2);padding:12px;text-align:center;cursor:pointer;color:var(--txt3);font-size:15px;letter-spacing:0.06em;transition:border-color 0.2s;user-select:none}
.photo-upload-area:hover{border-color:var(--red);color:var(--txt2)}
.photo-upload-area input[type=file]{display:none}
.photo-preview-strip{display:flex;gap:8px;margin-top:8px;overflow-x:auto;padding-bottom:4px}
.photo-preview-strip:empty{display:none}
.photo-preview-thumb{position:relative;flex-shrink:0;width:72px;height:72px}
.photo-preview-thumb img{width:72px;height:72px;object-fit:cover;display:block}
.photo-preview-thumb .rm-photo{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.75);color:#fff;border:none;width:18px;height:18px;font-size:15px;cursor:pointer;line-height:18px;text-align:center;padding:0}
/* EVENT PHOTO STRIP (detail) */
.event-photos{display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;scroll-snap-type:x mandatory;border-radius:0}
.event-photos img{flex-shrink:0;width:100%;max-width:calc(100% - 24px);height:200px;object-fit:cover;scroll-snap-align:start;cursor:pointer}
.event-photos img:only-child{max-width:100%}
/* TICKETS */
.tickets-section{margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.tickets-title{font-size:12px;letter-spacing:0.15em;text-transform:uppercase;color:var(--txt3);margin-bottom:10px}
.ticket-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.ticket-row:last-child{border-bottom:none}
.ticket-name{flex:1;font-size:14px;letter-spacing:0.04em;color:var(--txt)}
.ticket-price{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:0.06em;color:var(--txt2);white-space:nowrap}
.ticket-cap{font-size:12px;color:var(--txt3);letter-spacing:0.04em;white-space:nowrap}
.ticket-buy-btn{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:0.1em;padding:5px 12px;background:#7c3aed;color:white;border:none;cursor:pointer;transition:background 0.15s;white-space:nowrap}
.ticket-buy-btn:hover{background:#8b5cf6}
.ticket-buy-btn:disabled{background:var(--bg3);color:var(--txt3);cursor:default}
.ticket-del-btn{background:none;border:none;color:var(--txt3);font-size:14px;cursor:pointer;padding:2px 4px;transition:color 0.15s}
.ticket-del-btn:hover{color:#c62828}
.ticket-add-form{display:flex;flex-direction:column;gap:8px;margin-top:12px;padding:12px;background:var(--bg3);border:1px solid var(--border2)}
.ticket-add-form input{background:var(--bg);border:1px solid var(--border2);color:var(--txt);font-family:'DM Mono',monospace;font-size:13px;padding:7px 10px;letter-spacing:0.04em;outline:none;transition:border-color 0.2s;width:100%}
.ticket-add-form input:focus{border-color:#7c3aed}
.ticket-add-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ticket-add-submit{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:0.12em;padding:7px 16px;background:#7c3aed;color:white;border:none;cursor:pointer;align-self:flex-end;transition:background 0.15s}
.ticket-add-submit:hover{background:#8b5cf6}
.ticket-toggle{font-size:12px;color:var(--txt3);letter-spacing:0.08em;text-transform:uppercase;background:none;border:none;cursor:pointer;padding:0;margin-top:8px;transition:color 0.15s}
.ticket-toggle:hover{color:#7c3aed}

/* pending tickets in add-event form */
.pending-tickets-list{margin-bottom:6px}
.pending-ticket-row{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border);color:var(--txt2)}
.pending-ticket-row .pt-name{flex:1;letter-spacing:0.04em}
.pending-ticket-row .pt-meta{font-size:11px;color:var(--txt3);letter-spacing:0.04em}
.pending-ticket-rm{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:13px;padding:0 2px;line-height:1;transition:color 0.15s}
.pending-ticket-rm:hover{color:#c62828}

/* buy confirmation modal */
.buy-modal{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:1200;display:none;align-items:center;justify-content:center;padding:20px}
.buy-modal.open{display:flex}
.buy-card{background:var(--bg2);border:1px solid var(--border2);width:100%;max-width:400px;padding:28px}
.buy-card-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.12em;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.buy-card-close{background:none;border:none;color:var(--txt3);font-size:16px;cursor:pointer}
.buy-event-name{font-size:14px;letter-spacing:0.06em;color:var(--txt);margin-bottom:4px}
.buy-ticket-name{font-size:12px;color:var(--txt3);letter-spacing:0.04em;margin-bottom:20px}
.buy-price-table{width:100%;border-collapse:collapse;margin-bottom:16px}
.buy-price-table td{font-size:13px;padding:5px 0;letter-spacing:0.04em;color:var(--txt2)}
.buy-price-table td:last-child{text-align:right}
.buy-price-table .total-row td{color:var(--txt);font-size:15px;border-top:1px solid var(--border2);padding-top:10px;margin-top:4px}
.buy-terms{font-size:12px;color:var(--txt3);letter-spacing:0.04em;margin-bottom:18px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.buy-terms input{margin-top:2px;flex-shrink:0;accent-color:#7c3aed}
.buy-terms a{color:#7c3aed;text-decoration:none}
.buy-terms a:hover{text-decoration:underline}
.buy-pay-btn{width:100%;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.15em;padding:13px;background:#7c3aed;color:#fff;border:none;cursor:pointer;transition:background 0.15s}
.buy-pay-btn:hover{background:#8b5cf6}
.buy-pay-btn:disabled{background:var(--bg4);color:var(--txt3);cursor:default}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg3);border:1px solid var(--border2);color:var(--txt2);font-size:14px;letter-spacing:0.08em;padding:10px 20px;z-index:300;opacity:0;transition:all 0.2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* FILTER */
.filter-topbar{display:flex;align-items:center;gap:8px;padding:8px 20px;border-bottom:1px solid var(--border);background:var(--bg)}
.filter-toggle-btn{font-family:'DM Mono',monospace;font-size:15px;letter-spacing:0.1em;text-transform:uppercase;padding:5px 12px;border:1px solid var(--border2);color:var(--txt3);background:none;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px}
.filter-toggle-btn:hover,.filter-toggle-btn.open{border-color:var(--red2);color:var(--red2)}
.filter-toggle-btn .arrow{font-size:14px;transition:transform 0.2s}
.filter-toggle-btn.open .arrow{transform:rotate(180deg)}
.filter-active-badge{font-size:15px;color:var(--red2);letter-spacing:0.06em;padding:3px 8px;border:1px solid var(--red);background:var(--redglow)}
.filter-clear-btn{font-size:15px;letter-spacing:0.08em;color:var(--txt3);cursor:pointer;margin-left:auto;transition:color 0.15s;background:none;border:none;font-family:'DM Mono',monospace;padding:0}
.filter-clear-btn:hover{color:var(--red2)}
.filter-panel{border-bottom:1px solid var(--border);background:var(--bg2);overflow:hidden;max-height:0;transition:max-height 0.25s ease,opacity 0.2s;opacity:0;pointer-events:none}
.filter-panel.open{max-height:500px;opacity:1;pointer-events:auto}
.filter-section{padding:12px 20px 10px;border-bottom:1px solid var(--border)}
.filter-section:last-child{border-bottom:none}
.filter-section-label{font-size:15px;letter-spacing:0.12em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px}
.filter-chip{font-size:15px;letter-spacing:0.08em;text-transform:uppercase;padding:4px 10px;border:1px solid var(--border2);color:var(--txt3);cursor:pointer;transition:all 0.15s;background:none;font-family:'DM Mono',monospace;white-space:nowrap}
.filter-chip:hover{border-color:var(--txt3);color:var(--txt2)}
.filter-chip.active{border-color:transparent;color:#fff}
.filter-chip.city-chip.active{border-color:var(--red2);color:var(--red2);background:var(--redglow)}
.filter-chip.gps-btn{display:flex;align-items:center;gap:5px}
.filter-chip.gps-btn.locating{opacity:0.6;cursor:default}
.chips-wrap{display:flex;flex-wrap:wrap;gap:6px}

/* VIEW TABS */
.view-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg)}
.view-tab{font-family:'DM Mono',monospace;font-size:14px;letter-spacing:0.12em;text-transform:uppercase;padding:10px 20px;cursor:pointer;color:var(--txt3);border:none;background:none;border-bottom:2px solid transparent;transition:all 0.15s;margin-bottom:-1px}
.view-tab:hover{color:var(--txt2)}
.view-tab.active{color:var(--red2);border-bottom-color:var(--red2)}

/* MAP VIEW */
#mapView{flex:1;display:none;position:relative;min-height:calc(100vh - 200px)}
#mapView.visible{display:block}
#mainMap{width:100%;height:100%;min-height:calc(100vh - 200px)}
.leaflet-container{background:#111 !important}
.map-pin-popup .leaflet-popup-content-wrapper{background:var(--bg2);border:1px solid var(--border2);border-radius:2px;box-shadow:0 4px 20px rgba(0,0,0,0.6)}
.map-pin-popup .leaflet-popup-tip{background:var(--bg2)}
.map-pin-popup .leaflet-popup-content{margin:10px 14px;font-family:'DM Mono',monospace}
.popup-title{font-size:14px;letter-spacing:0.04em;color:#e8e8e8;margin-bottom:4px}
.popup-meta{font-size:14px;color:#666;letter-spacing:0.04em;margin-bottom:8px}
.popup-open{font-size:15px;letter-spacing:0.1em;text-transform:uppercase;color:var(--red2);cursor:pointer;border:none;background:none;font-family:'DM Mono',monospace;padding:0}
.popup-open:hover{text-decoration:underline}
.no-map-events{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#444;font-size:15px;letter-spacing:0.08em;pointer-events:none}

/* PICKER MAP in modal */
.picker-map-wrap{margin-top:8px;position:relative}
#pickerMap{width:100%;height:200px;border:1px solid var(--border2)}
.picker-hint{font-size:15px;color:var(--txt3);letter-spacing:0.06em;margin-top:4px}

/* LEGEND */
.cal-legend{display:flex;flex-wrap:wrap;gap:10px;padding:8px 20px;border-bottom:1px solid var(--border);background:var(--bg)}
.legend-item{display:flex;align-items:center;gap:5px;font-size:15px;color:var(--txt2);letter-spacing:0.06em}
.legend-dot{width:8px;height:8px;border-radius:50%}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.cal-event{animation:fadeIn 0.2s ease both}

@media (max-width:768px) {
  nav{padding:0 12px}
  .cal-header{padding:10px 12px}
  .cal-grid{grid-template-columns:1fr}
  .cal-grid-header{display:none}
  .cal-event{padding:10px 12px}
  .ev-meta{flex-wrap:wrap;gap:6px}
  .detail-modal{width:calc(100% - 24px);max-height:85vh}
  .detail-photos{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">HEAR ME OUT <span>Network</span></a>
  <div class="nav-links">
    <a class="nav-link" href="/">Feed</a>
    <a class="nav-link active" href="/events">Events</a>
    <a class="nav-link" href="/upload">Upload</a>
  </div>
  <div class="nav-icons">
    <button class="nav-icon" id="themeToggle" onclick="toggleTheme()" title="Toggle theme" style="background:none;border:none;cursor:pointer;font-size:16px">☀</button>

<script>
// ── Genre colour palette ───────────────────────────────────────────────────────
const PALETTE = [
  '#c62828','#6a1b9a','#1565c0','#2e7d32','#e65100',
  '#00695c','#4527a0','#0277bd','#6d4c41','#558b2f',
  '#ad1457','#00838f','#37474f','#f57f17','#283593'
];

function genreColor(genre) {
  if (!genre) return '#444';
  let h = 0;
  for (let i = 0; i < genre.length; i++) h = genre.charCodeAt(i) + ((h << 5) - h);
  return PALETTE[Math.abs(h) % PALETTE.length];
}

// ── State ─────────────────────────────────────────────────────────────────────
const now  = new Date();
let year   = now.getFullYear();
let month  = now.getMonth() + 1;
let events = [];

const filters = { genre: null, cityName: null, lat: null, lng: null, radius: 50 };

const MONTHS_CS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_CS   = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

const PRESET_GENRES = [
  'Pop','Hip Hop / Rap','Rock','EDM','R&B','Reggaeton / Latin Pop','K-Pop',
  'Country','Indie Rock / Indie Pop','Metal','Alternative','Soul',
  'Classical','Jazz','Reggae','Folk','Blues','Punk','Funk','Lo-Fi / Ambient'
];

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const res = await fetch('/api/me');
  if (!res.ok) { window.location.href = '/login'; return; }
  const me = await res.json();
  const ini = (me.display_name || '??').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('navAvatar').textContent = ini;
  pollUnread();
  renderGenreChips();
  await loadEvents();
}

// ── Filter panel ──────────────────────────────────────────────────────────────
function toggleFilterPanel() {
  document.getElementById('filterPanel').classList.toggle('open');
  document.getElementById('filterToggleBtn').classList.toggle('open');
}

function renderGenreChips() {
  const el = document.getElementById('genreChips');
  el.innerHTML = '';
  PRESET_GENRES.forEach(g => {
    const c = genreColor(g);
    const btn = document.createElement('button');
    btn.className = 'filter-chip genre-colored-chip';
    btn.style.borderColor = c;
    btn.style.color = c;
    btn.innerHTML = `<span style="width:7px;height:7px;border-radius:50%;background:${c};display:inline-block;flex-shrink:0"></span>${esc(g)}`;
    btn.style.display = 'inline-flex';
    btn.style.alignItems = 'center';
    btn.style.gap = '6px';
    btn.dataset.color = c;
    btn.onclick = () => filterByGenre(g, btn);
    el.appendChild(btn);
  });
  renderLegend();
}

function filterByGenre(genre, btn) {
  if (filters.genre === genre) {
    filters.genre = null;
    resetChipStyle(btn);
  } else {
    filters.genre = genre;
    document.querySelectorAll('#genreChips .filter-chip').forEach(c => resetChipStyle(c));
    activateChip(btn, genreColor(genre));
  }
  updateBadge();
  loadEvents();
}

function activateChip(btn, color) {
  btn.classList.add('active');
  btn.style.background = color;
  btn.style.borderColor = color;
  btn.style.color = '#fff';
  const dot = btn.querySelector('span');
  if (dot) dot.style.background = 'rgba(255,255,255,0.7)';
}

function resetChipStyle(btn) {
  const color = btn.dataset.color;
  btn.classList.remove('active');
  btn.style.background = '';
  btn.style.borderColor = color || '';
  btn.style.color = color || '';
  const dot = btn.querySelector('span');
  if (dot && color) dot.style.background = color;
}

function filterByCity(name, lat, lng) {
  if (filters.cityName === name) { clearFilters(); return; }
  filters.cityName = name;
  filters.lat = lat;
  filters.lng = lng;
  document.querySelectorAll('#cityChips .filter-chip').forEach(c =>
    c.classList.toggle('active', c.textContent.trim() === name));
  updateBadge();
  loadEvents();
}

function useMyLocation() {
  const btn = document.getElementById('nearMeBtn');
  if (!navigator.geolocation) { showToast('GPS not available'); return; }
  btn.classList.add('locating');
  btn.innerHTML = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="3" stroke="currentColor" stroke-width="1.4"/><line x1="5" y1="0" x2="5" y2="2.2" stroke="currentColor" stroke-width="1.4"/><line x1="5" y1="7.8" x2="5" y2="10" stroke="currentColor" stroke-width="1.4"/><line x1="0" y1="5" x2="2.2" y2="5" stroke="currentColor" stroke-width="1.4"/><line x1="7.8" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="1.4"/></svg> Locating...`;
  navigator.geolocation.getCurrentPosition(pos => {
    filters.lat = pos.coords.latitude;
    filters.lng = pos.coords.longitude;
    filters.cityName = 'Near me';
    btn.classList.remove('locating');
    btn.innerHTML = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="3" stroke="currentColor" stroke-width="1.4"/><line x1="5" y1="0" x2="5" y2="2.2" stroke="currentColor" stroke-width="1.4"/><line x1="5" y1="7.8" x2="5" y2="10" stroke="currentColor" stroke-width="1.4"/><line x1="0" y1="5" x2="2.2" y2="5" stroke="currentColor" stroke-width="1.4"/><line x1="7.8" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="1.4"/></svg> Near me`;
    btn.classList.add('active');
    document.querySelectorAll('#cityChips .filter-chip:not(#nearMeBtn)').forEach(c => c.classList.remove('active'));
    updateBadge();
    loadEvents();
  }, () => {
    btn.classList.remove('locating');
    btn.innerHTML = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="3" stroke="currentColor" stroke-width="1.4"/><line x1="5" y1="0" x2="5" y2="2.2" stroke="currentColor" stroke-width="1.4"/><line x1="5" y1="7.8" x2="5" y2="10" stroke="currentColor" stroke-width="1.4"/><line x1="0" y1="5" x2="2.2" y2="5" stroke="currentColor" stroke-width="1.4"/><line x1="7.8" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="1.4"/></svg> Near me`;
    showToast('GPS denied or unavailable');
  });
}

function clearFilters() {
  filters.genre = null; filters.lat = null; filters.lng = null; filters.cityName = null;
  document.querySelectorAll('.filter-chip').forEach(c => { c.classList.remove('active'); c.style.background = ''; });
  document.getElementById('nearMeBtn').innerHTML = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="3" stroke="currentColor" stroke-width="1.4"/><line x1="5" y1="0" x2="5" y2="2.2" stroke="currentColor" stroke-width="1.4"/><line x1="5" y1="7.8" x2="5" y2="10" stroke="currentColor" stroke-width="1.4"/><line x1="0" y1="5" x2="2.2" y2="5" stroke="currentColor" stroke-width="1.4"/><line x1="7.8" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="1.4"/></svg> Near me`;
  updateBadge();
  loadEvents();
}

function updateBadge() {
  const parts = [];
  if (filters.genre) parts.push(filters.genre);
  if (filters.cityName) parts.push(filters.cityName === 'Near me' ? 'Near me (50km)' : `Near ${filters.cityName} (50km)`);
  const badge = document.getElementById('activeFilterBadge');
  const clearBtn = document.getElementById('filterClearBtn');
  if (parts.length) {
    badge.textContent = parts.join(' · '); badge.style.display = 'block'; clearBtn.style.display = 'block';
  } else {
    badge.style.display = 'none'; clearBtn.style.display = 'none';
  }
}

function renderLegend() {
  const active = PRESET_GENRES.filter(g => events.some(e => e.genre === g));
  const el = document.getElementById('calLegend');
  if (!active.length) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = active.map(g =>
    `<div class="legend-item"><div class="legend-dot" style="background:${genreColor(g)}"></div>${esc(g)}</div>`
  ).join('');
}

// ── Events ────────────────────────────────────────────────────────────────────
async function loadEvents() {
  let url = `/api/events?year=${year}&month=${month}`;
  if (filters.genre) url += `&genre=${encodeURIComponent(filters.genre)}`;
  if (filters.lat != null) url += `&lat=${filters.lat}&lng=${filters.lng}&radius=${filters.radius}`;
  else if (filters.cityName && filters.cityName !== 'Near me') url += `&city=${encodeURIComponent(filters.cityName)}`;
  try { events = await fetch(url).then(r => r.json()); } catch { events = []; }
  renderLegend();
  renderCalendar();
  if (currentView === 'map') renderMap();
}

// ── Calendar render ───────────────────────────────────────────────────────────
function renderCalendar() {
  document.getElementById('calMonthTitle').textContent = `${MONTHS_CS[month-1]} ${year}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Day headers
  DAYS_CS.forEach(d => {
    const h = document.createElement('div');
    h.className = 'cal-day-header';
    h.textContent = d;
    grid.appendChild(h);
  });

  // First day of month (Mon-based: 0=Mon … 6=Sun)
  const firstDate = new Date(year, month - 1, 1);
  const lastDate  = new Date(year, month, 0);
  const firstDow  = (firstDate.getDay() + 6) % 7; // Monday = 0
  const daysInMonth = lastDate.getDate();

  // Days in previous month
  const prevLast = new Date(year, month - 1, 0).getDate();

  // Map events by date string
  const byDate = {};
  events.forEach(e => {
    if (!byDate[e.date]) byDate[e.date] = [];
    byDate[e.date].push(e);
  });

  const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

  // Total cells: at least 5 rows × 7
  const totalCells = Math.ceil((firstDow + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell';

    let dayNum, dateStr, inMonth;
    if (i < firstDow) {
      dayNum   = prevLast - firstDow + i + 1;
      const pm = month === 1 ? 12 : month - 1;
      const py = month === 1 ? year - 1 : year;
      dateStr  = `${py}-${String(pm).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
      inMonth  = false;
    } else if (i >= firstDow + daysInMonth) {
      dayNum   = i - firstDow - daysInMonth + 1;
      const nm = month === 12 ? 1 : month + 1;
      const ny = month === 12 ? year + 1 : year;
      dateStr  = `${ny}-${String(nm).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
      inMonth  = false;
    } else {
      dayNum  = i - firstDow + 1;
      dateStr = `${year}-${String(month).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
      inMonth = true;
    }

    if (!inMonth) cell.classList.add('other-month');
    if (dateStr === todayStr) cell.classList.add('today');

    const numEl = document.createElement('div');
    numEl.className = 'cal-day-num';
    numEl.textContent = dayNum;
    cell.appendChild(numEl);

    const dayEvents = byDate[dateStr] || [];
    const maxShow   = 3;
    dayEvents.slice(0, maxShow).forEach(ev => {
      const pill = document.createElement('div');
      pill.className = 'cal-event';
      pill.style.background = genreColor(ev.genre);
      pill.title = `${ev.time ? ev.time + ' · ' : ''}${ev.title}${ev.venue ? ' @ ' + ev.venue : ''}`;
      pill.textContent = (ev.time ? ev.time.slice(0,5) + ' ' : '') + ev.title;
      pill.onclick = (e) => { e.stopPropagation(); openDetail(ev); };
      cell.appendChild(pill);
    });
    if (dayEvents.length > maxShow) {
      const more = document.createElement('div');
      more.className = 'cal-more';
      more.textContent = `+${dayEvents.length - maxShow} more`;
      more.onclick = () => showDayEvents(dateStr, dayEvents);
      cell.appendChild(more);
    }

    grid.appendChild(cell);
  }
}

// ── Navigation ────────────────────────────────────────────────────────────────
function prevMonth() {
  if (month === 1) { month = 12; year--; } else { month--; }
  loadEvents();
}
function nextMonth() {
  if (month === 12) { month = 1; year++; } else { month++; }
  loadEvents();
}
function goToday() {
  year  = now.getFullYear();
  month = now.getMonth() + 1;
  loadEvents();
}

// ── View toggle (Calendar / Map) ──────────────────────────────────────────────
let mainMap = null;
let mapMarkers = [];
let currentView = 'cal';

function switchView(v) {
  currentView = v;
  document.getElementById('calView').style.display  = v === 'cal' ? '' : 'none';
  document.getElementById('mapView').classList.toggle('visible', v === 'map');
  document.getElementById('tabCal').classList.toggle('active', v === 'cal');
  document.getElementById('tabMap').classList.toggle('active', v === 'map');
  if (v === 'map') {
    if (!mainMap) initMainMap();
    else renderMap();
  }
}

function initMainMap() {
  mainMap = L.map('mainMap', { zoomControl: true }).setView([49.8, 15.5], 7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    maxZoom: 19
  }).addTo(mainMap);
  renderMap();
}

function renderMap() {
  if (!mainMap) return;
  mapMarkers.forEach(m => m.remove());
  mapMarkers = [];

  const withCoords = events.filter(e => e.lat != null && e.lng != null);
  document.getElementById('noMapEvents').style.display = withCoords.length ? 'none' : 'block';

  withCoords.forEach(ev => {
    const color = genreColor(ev.genre);
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,0.8);box-shadow:0 2px 8px rgba(0,0,0,0.6)"></div>`,
      iconSize: [14, 14],
      iconAnchor: [7, 7],
      popupAnchor: [0, -10]
    });
    const marker = L.marker([ev.lat, ev.lng], {icon})
      .addTo(mainMap)
      .bindPopup(`
        <div class="popup-title">${esc(ev.title)}</div>
        <div class="popup-meta">${[ev.date, ev.time, ev.venue, ev.city].filter(Boolean).join(' · ')}</div>
        ${ev.genre ? `<div class="popup-meta" style="color:${color}">${esc(ev.genre)}</div>` : ''}
        <a class="popup-open" href="/events/${ev.id}">Open event →</a>
      `, {className: 'map-pin-popup'});
    mapMarkers.push(marker);
  });

  if (withCoords.length) {
    const group = L.featureGroup(mapMarkers);
    mainMap.fitBounds(group.getBounds().pad(0.2));
  }
}

// ── Picker map (in add modal) ─────────────────────────────────────────────────
let pickerMap = null;
let pickerMarker = null;

const CITY_COORDS = {
  'Praha':      [50.0755, 14.4378],
  'Brno':       [49.1951, 16.6068],
  'Ostrava':    [49.8209, 18.2625],
  'Bratislava': [48.1486, 17.1077],
  'Plzeň':      [49.7384, 13.3736],
  'Liberec':    [50.7663, 15.0543],
  'Olomouc':    [49.5938, 17.2509],
  'Košice':     [48.7164, 21.2611],
  'Žilina':     [49.2231, 18.7394],
  'Prešov':     [49.0014, 21.2394],
};

function initPickerMap() {
  if (pickerMap) { pickerMap.invalidateSize(); return; }
  pickerMap = L.map('pickerMap', {zoomControl:true}).setView([49.8, 15.5], 7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', maxZoom: 19
  }).addTo(pickerMap);
  pickerMap.on('click', e => setPickerPin(e.latlng.lat, e.latlng.lng));
}

function setPickerPin(lat, lng) {
  document.getElementById('aLat').value = lat;
  document.getElementById('aLng').value = lng;
  if (pickerMarker) pickerMarker.remove();
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;border-radius:50%;background:var(--red2);border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.6)"></div>`,
    iconSize: [14,14], iconAnchor: [7,7]
  });
  pickerMarker = L.marker([lat, lng], {icon}).addTo(pickerMap);
}

function onCityInput(val) {
  if (!pickerMap) return;
  const key = Object.keys(CITY_COORDS).find(k =>
    k.toLowerCase() === val.trim().toLowerCase()
  );
  if (key && Array.isArray(CITY_COORDS[key])) {
    const [lat, lng] = CITY_COORDS[key];
    pickerMap.setView([lat, lng], 12);
    setPickerPin(lat, lng);
  }
}

// ── Day overflow list ─────────────────────────────────────────────────────────
function showDayEvents(dateStr, evs) {
  const wrap = document.createElement('div');
  const label = document.createElement('div');
  label.style.cssText = 'font-size:14px;color:var(--txt3);letter-spacing:0.08em;margin-bottom:14px';
  label.textContent = dateStr;
  wrap.appendChild(label);

  evs.forEach(ev => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer';
    row.innerHTML = `
      <div style="width:8px;height:8px;border-radius:50%;background:${genreColor(ev.genre)};flex-shrink:0"></div>
      <div>
        <div style="font-size:15px;letter-spacing:0.04em">${esc(ev.title)}</div>
        <div style="font-size:15px;color:var(--txt3);margin-top:2px">${esc([ev.time, ev.venue, ev.city].filter(Boolean).join(' · '))}</div>
      </div>`;
    row.onclick = () => openDetail(ev);
    wrap.appendChild(row);
  });

  document.getElementById('dGenreTag').textContent = '';
  document.getElementById('dContent').innerHTML = '';
  document.getElementById('dContent').appendChild(wrap);
  document.getElementById('detailModal').classList.add('open');
}

// ── Event detail ──────────────────────────────────────────────────────────────
function openDetail(ev) {
  _currentEv = ev;
  const color = genreColor(ev.genre);
  const rows = [];
  if (ev.time)  rows.push(`<div class="detail-row"><span class="icon">⏱</span>${esc(ev.time)}</div>`);
  if (ev.venue) rows.push(`<div class="detail-row"><span class="icon">◈</span>${esc(ev.venue)}</div>`);
  if (ev.city)  rows.push(`<div class="detail-row"><span class="icon">⌖</span>${esc(ev.city)}</div>`);
  if (ev.description) rows.push(`<div class="detail-row" style="flex-direction:column;align-items:flex-start"><div style="color:var(--txt2);line-height:1.7;font-size:15px;white-space:pre-wrap">${esc(ev.description)}</div></div>`);
  if (ev.link)  rows.push(`<div class="detail-row"><span class="icon">↗</span><a class="detail-link" href="${esc(ev.link)}" target="_blank" rel="noopener">${esc(ev.link)}</a></div>`);

  const deleteBtn = ev.is_own
    ? `<button class="detail-delete" onclick="deleteEvent(${ev.id})">Delete event</button>`
    : '';
  const saveBtn = !ev.is_own
    ? `<button class="detail-save-btn ${ev.is_saved ? 'saved' : ''}" id="evSaveBtn-${ev.id}" onclick="toggleEventSave(${ev.id},this)">
        ${ev.is_saved ? '◷ Saved to calendar' : '◷ Save to calendar'}
       </button>`
    : '';
  const ticketBtn = ev.is_own
    ? `<a href="/scan?event=${ev.id}" class="detail-save-btn" style="margin-top:8px;display:block;text-align:center;color:#7c3aed;border-color:#7c3aed">
        ▷ Scan tickets
       </a>`
    : '';

  document.getElementById('dGenreTag').innerHTML = ev.genre
    ? `<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:${color};display:inline-block"></span>${esc(ev.genre)}</span>`
    : '';

  const photosHtml = ev.photos && ev.photos.length
    ? `<div class="event-photos">${ev.photos.map(p => `<img src="${esc(p)}" loading="lazy">`).join('')}</div>`
    : '';

  document.getElementById('dContent').innerHTML = `
    ${photosHtml}
    <div class="detail-title">${esc(ev.title)}</div>
    <div style="font-size:14px;color:var(--txt3);letter-spacing:0.08em;margin-bottom:16px">${esc(ev.date)}</div>
    ${rows.join('')}
    <div class="detail-user">
      <div class="detail-avatar">${esc(ev.user.initials)}</div>
      <div>
        <a href="/profile/${esc(ev.user.username)}" class="detail-user-name" style="color:var(--txt);text-decoration:none">${esc(ev.user.display_name)}</a>
        <div class="detail-user-sub">added this event</div>
      </div>
    </div>
    ${saveBtn}
    ${ticketBtn}
    ${deleteBtn}
    <div class="tickets-section" id="ticketsSection"></div>`;

  document.getElementById('detailModal').classList.add('open');
  loadTicketTypes(ev.id, ev.is_own);
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('open');
}

// ── Ticket types ──────────────────────────────────────────────────────────────
let _ticketEventId = null;
let _ticketIsOwn   = false;
let _currentEv     = null;

async function loadTicketTypes(eventId, isOwn) {
  _ticketEventId = eventId;
  _ticketIsOwn   = isOwn;
  const sec = document.getElementById('ticketsSection');
  if (!sec) return;
  const types = await fetch(`/api/events/${eventId}/ticket-types`).then(r => r.json()).catch(() => []);
  renderTicketTypes(types, isOwn);
}

function renderTicketTypes(types, isOwn) {
  const sec = document.getElementById('ticketsSection');
  if (!sec) return;

  const rows = types.map(tt => {
    const soldOut = tt.capacity > 0 && tt.sold >= tt.capacity;
    const capLabel = tt.capacity > 0 ? `${tt.sold}/${tt.capacity}` : '';
    const buyBtn = isOwn
      ? `<button class="ticket-del-btn" onclick="deleteTicketType(${tt.id})" title="Delete">✕</button>`
      : `<button class="ticket-buy-btn" ${soldOut ? 'disabled' : ''} onclick="buyTicket(${tt.id})">${soldOut ? 'Sold out' : 'Buy'}</button>`;
    return `<div class="ticket-row">
      <span class="ticket-name">${esc(tt.name)}</span>
      ${capLabel ? `<span class="ticket-cap">${capLabel}</span>` : ''}
      <span class="ticket-price">${tt.price > 0 ? Number(tt.price).toLocaleString('cs-CZ') + ' ' + tt.currency : 'Free'}</span>
      ${buyBtn}
    </div>`;
  }).join('');

  const addForm = isOwn ? `
    <button class="ticket-toggle" id="ticketToggleBtn" onclick="toggleTicketForm()">+ Add ticket</button>
    <div class="ticket-add-form" id="ticketAddForm" style="display:none">
      <input id="ttName" placeholder="Name (e.g. Standard, VIP…)" maxlength="60">
      <div class="ticket-add-row">
        <input id="ttPrice" type="number" min="0" placeholder="Price in CZK">
        <input id="ttCapacity" type="number" min="0" placeholder="Capacity (0 = unlimited)">
      </div>
      <button class="ticket-add-submit" onclick="submitTicketType()">Add</button>
    </div>` : '';

  sec.innerHTML = `
    <div class="tickets-title">Tickets</div>
    ${rows || `<div style="font-size:13px;color:var(--txt3);padding:4px 0">${isOwn ? 'No tickets yet.' : 'No tickets for this event.'}</div>`}
    ${addForm}`;
}

function toggleTicketForm() {
  const form = document.getElementById('ticketAddForm');
  const btn  = document.getElementById('ticketToggleBtn');
  const open = form.style.display === 'none';
  form.style.display = open ? 'flex' : 'none';
  btn.textContent = open ? '✕ Close' : '+ Add ticket';
}

async function submitTicketType() {
  const name     = document.getElementById('ttName').value.trim();
  const price    = parseInt(document.getElementById('ttPrice').value) || 0;
  const capacity = parseInt(document.getElementById('ttCapacity').value) || 0;
  if (!name) { showToast('Enter a ticket name'); return; }
  const res = await fetch(`/api/events/${_ticketEventId}/ticket-types`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({name, price, capacity, currency: 'CZK'})
  });
  if (!res.ok) { showToast((await res.json()).error || 'Error'); return; }
  loadTicketTypes(_ticketEventId, _ticketIsOwn);
}

async function deleteTicketType(id) {
  if (!confirm('Delete this ticket type?')) return;
  const res = await fetch(`/api/ticket-types/${id}`, {method:'DELETE'});
  if (!res.ok) { showToast('Error deleting ticket'); return; }
  loadTicketTypes(_ticketEventId, _ticketIsOwn);
}

// ── Buy confirmation modal ────────────────────────────────────────────────────
let _buyTtId = null;

async function buyTicket(ttId) {
  // fetch ticket type details for the confirmation screen
  const types = await fetch(`/api/events/${_ticketEventId}/ticket-types`).then(r => r.json()).catch(() => []);
  const tt = types.find(t => t.id === ttId);
  if (!tt) { showToast('Ticket not found'); return; }

  _buyTtId = ttId;
  const fee = Math.max(1, Math.round(tt.price * 0.10));
  const total = tt.price + fee;

  document.getElementById('buyEventName').textContent = _currentEv ? _currentEv.title : '';
  document.getElementById('buyTicketName').textContent = tt.name;
  document.getElementById('buyPriceRows').innerHTML = `
    <tr><td>Ticket — ${esc(tt.name)}</td><td>${Number(tt.price).toLocaleString('cs-CZ')} ${tt.currency}</td></tr>
    <tr><td style="color:var(--txt3)">Processing fee (10 %)</td><td style="color:var(--txt3)">${fee.toLocaleString('cs-CZ')} ${tt.currency}</td></tr>
    <tr class="total-row"><td>Total</td><td>${total.toLocaleString('cs-CZ')} ${tt.currency}</td></tr>
  `;
  document.getElementById('buyTermsCheck').checked = false;
  document.getElementById('buyPayBtn').disabled = true;
  document.getElementById('buyModal').classList.add('open');
}

function closeBuyModal() {
  document.getElementById('buyModal').classList.remove('open');
  _buyTtId = null;
}

async function confirmBuy() {
  if (!_buyTtId) return;
  const btn = document.getElementById('buyPayBtn');
  btn.disabled = true;
  btn.textContent = 'Redirecting…';
  const res = await fetch(`/api/ticket-types/${_buyTtId}/checkout`, {method:'POST'});
  const data = await res.json();
  if (data.error) { showToast(data.error); btn.disabled = false; btn.textContent = 'Pay with card →'; return; }
  window.location.href = data.url;
}

async function toggleEventSave(id, btn) {
  const res  = await fetch(`/api/events/${id}/save`, {method:'POST'});
  const data = await res.json();
  if (data.saved !== undefined) {
    btn.classList.toggle('saved', data.saved);
    btn.textContent = data.saved ? '◷ Saved to calendar' : '◷ Save to calendar';
    showToast(data.saved ? 'Saved to calendar' : 'Removed from calendar');
  }
}

async function deleteEvent(id) {
  if (!confirm('Delete this event?')) return;
  const res = await fetch(`/api/events/${id}`, {method:'DELETE'});
  const data = await res.json();
  if (data.ok) {
    closeDetail();
    await loadEvents();
    showToast('Event deleted');
  } else {
    showToast(data.error || 'Error');
  }
}

// ── Add event ─────────────────────────────────────────────────────────────────
// ── Pending tickets in Add Event form ────────────────────────────────────────
let _pendingTickets = [];

function toggleNewTicketForm() {
  const form = document.getElementById('newTicketForm');
  const btn  = document.getElementById('ntToggleBtn');
  const open = form.style.display === 'none';
  form.style.display = open ? 'flex' : 'none';
  btn.textContent = open ? '✕ Close' : '+ Add ticket type';
}

function addPendingTicket() {
  const name     = document.getElementById('ntName').value.trim();
  const price    = parseInt(document.getElementById('ntPrice').value) || 0;
  const capacity = parseInt(document.getElementById('ntCapacity').value) || 0;
  if (!name) { showToast('Enter a ticket name'); return; }
  _pendingTickets.push({name, price, capacity, currency: 'CZK'});
  document.getElementById('ntName').value = '';
  document.getElementById('ntPrice').value = '';
  document.getElementById('ntCapacity').value = '';
  renderPendingTickets();
}

function renderPendingTickets() {
  const list = document.getElementById('pendingTicketList');
  if (!list) return;
  list.innerHTML = _pendingTickets.map((t, i) => `
    <div class="pending-ticket-row">
      <span class="pt-name">${esc(t.name)}</span>
      <span class="pt-meta">${t.price > 0 ? t.price.toLocaleString('cs-CZ') + ' CZK' : 'Free'}${t.capacity > 0 ? ' · ' + t.capacity + ' pcs' : ''}</span>
      <button type="button" class="pending-ticket-rm" onclick="_pendingTickets.splice(${i},1);renderPendingTickets()">✕</button>
    </div>
  `).join('');
}

function openAdd() {
  const d = new Date();
  document.getElementById('aDate').value =
    `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  document.getElementById('aLat').value = '';
  document.getElementById('aLng').value = '';
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => {
    initPickerMap();
    if (pickerMarker) { pickerMarker.remove(); pickerMarker = null; }
    pickerMap.setView([49.8, 15.5], 7);
    pickerMap.invalidateSize();
  }, 80);
}

function closeAdd() {
  document.getElementById('addModal').classList.remove('open');
  selectedPhotos = [];
  renderPhotoPreviews();
  _pendingTickets = [];
  renderPendingTickets();
  document.getElementById('newTicketForm').style.display = 'none';
  document.getElementById('ntToggleBtn').textContent = '+ Add ticket type';
}

let selectedPhotos = [];

function previewPhotos(input) {
  const files = Array.from(input.files);
  const remaining = 5 - selectedPhotos.length;
  selectedPhotos = [...selectedPhotos, ...files.slice(0, remaining)].slice(0, 5);
  input.value = '';
  renderPhotoPreviews();
}

function renderPhotoPreviews() {
  const strip = document.getElementById('photoPreviewStrip');
  const hint  = document.getElementById('photoUploadHint');
  strip.innerHTML = '';
  selectedPhotos.forEach((file, i) => {
    const div = document.createElement('div');
    div.className = 'photo-preview-thumb';
    const img = document.createElement('img');
    const btn = document.createElement('button');
    btn.className = 'rm-photo';
    btn.type = 'button';
    btn.textContent = '✕';
    btn.onclick = () => { selectedPhotos.splice(i, 1); renderPhotoPreviews(); };
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    reader.readAsDataURL(file);
    div.appendChild(img);
    div.appendChild(btn);
    strip.appendChild(div);
  });
  hint.textContent = selectedPhotos.length === 0
    ? '＋ Add photos'
    : selectedPhotos.length < 5
      ? `＋ Add photos (${selectedPhotos.length}/5)`
      : '5/5 photos';
  document.getElementById('photoUploadArea').style.display =
    selectedPhotos.length >= 5 ? 'none' : 'block';
}

async function submitEvent(e) {
  e.preventDefault();
  const btn = document.getElementById('aSave');
  btn.disabled = true; btn.textContent = 'SAVING...';
  document.getElementById('addError').classList.remove('visible');

  const lat = parseFloat(document.getElementById('aLat').value);
  const lng = parseFloat(document.getElementById('aLng').value);
  const fd = new FormData();
  fd.append('title',       document.getElementById('aTitle').value.trim());
  fd.append('date',        document.getElementById('aDate').value);
  fd.append('time',        document.getElementById('aTime').value);
  fd.append('venue',       document.getElementById('aVenue').value.trim());
  fd.append('city',        document.getElementById('aCity').value.trim());
  fd.append('genre',       document.getElementById('aGenre').value.trim());
  fd.append('description', document.getElementById('aDesc').value.trim());
  fd.append('link',        document.getElementById('aLink').value.trim());
  if (!isNaN(lat)) fd.append('lat', lat);
  if (!isNaN(lng)) fd.append('lng', lng);
  selectedPhotos.forEach((f, i) => fd.append(`photo${i + 1}`, f));

  const res  = await fetch('/api/events', {method:'POST', body:fd});
  const data = await res.json();

  if (data.ok) {
    // save pending ticket types
    for (const t of _pendingTickets) {
      await fetch(`/api/events/${data.id}/ticket-types`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(t)
      });
    }
    _pendingTickets = [];
    renderPendingTickets();
    document.getElementById('newTicketForm').style.display = 'none';
    document.getElementById('ntToggleBtn').textContent = '+ Add ticket type';
    document.getElementById('addForm').reset();
    closeAdd();
    await loadEvents();
    showToast('Event added');
    if (currentView === 'map') renderMap();
  } else {
    const el = document.getElementById('addError');
    el.textContent = data.error || 'Error';
    el.classList.add('visible');
  }
  btn.disabled = false; btn.textContent = 'ADD EVENT';
}

// ── Modals close on backdrop click ────────────────────────────────────────────
['addModal','detailModal','buyModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target.id === id) {
      document.getElementById(id).classList.remove('open');
      if (id === 'buyModal') _buyTtId = null;
    }
  });
});

// ── Profile nav ───────────────────────────────────────────────────────────────
function goProfile(e) {
  e.preventDefault();
  fetch('/api/me').then(r => r.json()).then(me => {
    window.location.href = '/profile/' + me.username;
  });
}

// ── Unread badge ──────────────────────────────────────────────────────────────
async function pollUnread() {
  try {
    const data = await fetch('/api/messages/unread').then(r => r.json());
    const badge = document.getElementById('msgBadge');
    if (data.count > 0) {
      badge.textContent = data.count > 9 ? '9+' : data.count;
      badge.style.display = 'flex';
    } else { badge.style.display = 'none'; }
  } catch {}
  setTimeout(pollUnread, 15000);
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
