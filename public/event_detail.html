<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event — Hear Me Out</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg2:#080808;--bg3:#101010;--bg4:#181818;
  --red:#8b0000;--red2:#b20000;--red3:#cc0000;
  --txt:#e8e8e8;--txt2:#888;--txt3:#444;
  --border:#1a1a1a;--border2:#222;
}
body{background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace;min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#7c3aed;border-radius:2px}
a{color:inherit;text-decoration:none}

nav{background:rgba(0,0,0,0.95);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.2em;color:#fff}
.nav-back{font-size:11px;color:var(--txt3);letter-spacing:0.08em;cursor:pointer;transition:color 0.15s}
.nav-back:hover{color:var(--txt2)}

.wrap{max-width:720px;margin:0 auto;padding:40px 24px 80px}

.ev-genre-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--txt3);margin-bottom:16px}
.ev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.ev-title{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:0.08em;line-height:1.1;margin-bottom:24px}

.ev-meta{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;padding:20px;background:var(--bg2);border:1px solid var(--border2)}
.ev-meta-row{display:flex;align-items:flex-start;gap:12px;font-size:13px;letter-spacing:0.04em}
.ev-meta-icon{color:var(--txt3);width:16px;flex-shrink:0;text-align:center;margin-top:1px}
.ev-meta-val{color:var(--txt2);line-height:1.5}
.ev-meta-val a{color:var(--red2)}
.ev-meta-val a:hover{text-decoration:underline}

.ev-desc{font-size:14px;color:var(--txt2);line-height:1.8;white-space:pre-wrap;margin-bottom:28px}

.ev-photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:28px}
.ev-photos img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--bg3)}

.ev-organizer{display:flex;align-items:center;gap:12px;padding:16px;background:var(--bg2);border:1px solid var(--border2);margin-bottom:28px;cursor:pointer;transition:border-color 0.15s}
.ev-organizer:hover{border-color:var(--border)}
.ev-av{width:38px;height:38px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--red2);flex-shrink:0;overflow:hidden}
.ev-av img{width:100%;height:100%;object-fit:cover}
.ev-org-name{font-size:13px;letter-spacing:0.06em;color:var(--txt)}
.ev-org-sub{font-size:11px;color:var(--txt3);letter-spacing:0.06em;margin-top:2px}

.save-btn{width:100%;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.15em;padding:14px;background:none;color:var(--txt2);border:1px solid var(--border2);cursor:pointer;transition:all 0.15s;margin-bottom:12px}
.save-btn:hover{border-color:var(--txt3);color:var(--txt)}
.save-btn.saved{color:#7c3aed;border-color:#7c3aed}

.scan-btn{width:100%;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.15em;padding:14px;background:#7c3aed;color:#fff;border:none;cursor:pointer;transition:background 0.15s;margin-bottom:12px;display:block;text-align:center}
.scan-btn:hover{background:#8b5cf6}
.ticket-count{font-size:11px;letter-spacing:0.08em;color:var(--txt3);text-align:center;margin-bottom:20px}

.loading{color:var(--txt3);font-size:13px;letter-spacing:0.08em;padding:60px 0;text-align:center}
.error-msg{color:var(--red2);font-size:13px;padding:60px 0;text-align:center}
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">HEAR ME OUT</a>
  <span class="nav-back" onclick="history.back()">← Back</span>
</nav>

<div class="wrap" id="wrap">
  <div class="loading">Loading event...</div>
</div>

<script>
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const PALETTE = [
  '#c62828','#6a1b9a','#1565c0','#2e7d32','#e65100',
  '#00695c','#4527a0','#0277bd','#6d4c41','#558b2f',
  '#ad1457','#00838f','#37474f','#f57f17','#283593'
];
function genreColor(genre) {
  if (!genre) return '#444';
  let h = 0;
  for (let i = 0; i < genre.length; i++) h = genre.charCodeAt(i) + ((h << 5) - h);
  return PALETTE[Math.abs(h) % PALETTE.length];
}

function formatDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

async function load() {
  const id = location.pathname.split('/').pop();
  const res = await fetch(`/api/events/${id}`).catch(() => null);
  if (!res || !res.ok) {
    document.getElementById('wrap').innerHTML = '<div class="error-msg">Event not found.</div>';
    return;
  }
  const ev = await res.json();

  const color = genreColor(ev.genre);
  const av = ev.user.avatar
    ? `<img src="${esc(ev.user.avatar)}" alt="" onerror="this.parentElement.textContent='${esc((ev.user.display_name||'?')[0])}'">`
    : esc((ev.user.display_name||'?')[0].toUpperCase());

  const meta = [];
  const datePart = formatDate(ev.date) + (ev.time ? ' · ' + ev.time : '');
  if (datePart) meta.push(`<div class="ev-meta-row"><span class="ev-meta-icon">◷</span><span class="ev-meta-val">${esc(datePart)}</span></div>`);
  if (ev.venue) meta.push(`<div class="ev-meta-row"><span class="ev-meta-icon">◈</span><span class="ev-meta-val">${esc(ev.venue)}</span></div>`);
  if (ev.city)  meta.push(`<div class="ev-meta-row"><span class="ev-meta-icon">⌖</span><span class="ev-meta-val">${esc(ev.city)}</span></div>`);
  if (ev.link)  meta.push(`<div class="ev-meta-row"><span class="ev-meta-icon">↗</span><span class="ev-meta-val"><a href="${esc(ev.link)}" target="_blank" rel="noopener">${esc(ev.link)}</a></span></div>`);

  const photos = ev.photos && ev.photos.length
    ? `<div class="ev-photos">${ev.photos.map(p => `<img src="${esc(p)}" loading="lazy">`).join('')}</div>`
    : '';

  const saveBtn = !ev.is_own
    ? `<button class="save-btn${ev.is_saved ? ' saved' : ''}" id="saveBtn" onclick="toggleSave()">
        ${ev.is_saved ? '◷ Saved to calendar' : '◷ Save to calendar'}
       </button>`
    : `<a class="scan-btn" href="/scan?event=${ev.id}">▷ Scan tickets</a>
       <div class="ticket-count" id="ticketCount"></div>`;

  document.title = `${ev.title} — Hear Me Out`;
  document.getElementById('wrap').innerHTML = `
    ${ev.genre ? `<div class="ev-genre-tag"><span class="ev-dot" style="background:${color}"></span>${esc(ev.genre)}</div>` : ''}
    <div class="ev-title">${esc(ev.title)}</div>
    ${meta.length ? `<div class="ev-meta">${meta.join('')}</div>` : ''}
    ${ev.description ? `<div class="ev-desc">${esc(ev.description)}</div>` : ''}
    ${photos}
    <div class="ev-organizer" onclick="location.href='/profile/${esc(ev.user.username)}'">
      <div class="ev-av">${av}</div>
      <div>
        <div class="ev-org-name">${esc(ev.user.display_name)}</div>
        <div class="ev-org-sub">@${esc(ev.user.username)}</div>
      </div>
    </div>
    ${saveBtn}
    <button onclick="shareEvent(${ev.id})" style="width:100%;margin-top:10px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:0.14em;padding:12px;background:none;color:var(--txt3);border:1px solid var(--border2);cursor:pointer;transition:all 0.15s" onmouseover="this.style.color='var(--txt)';this.style.borderColor='var(--txt3)'" onmouseout="this.style.color='var(--txt3)';this.style.borderColor='var(--border2)'">↗ Download share card</button>
  `;

  window.__evId = ev.id;
  window.__evSaved = ev.is_saved;

  if (ev.is_own) {
    fetch(`/api/events/${ev.id}/ticket-stats`).then(r => r.ok ? r.json() : null).then(d => {
      if (!d) return;
      const el = document.getElementById('ticketCount');
      if (el) el.textContent = `${d.sold} sold · ${d.used} scanned`;
    });
  }
}

async function toggleSave() {
  const btn = document.getElementById('saveBtn');
  if (!btn) return;
  const res = await fetch(`/api/events/${window.__evId}/save`, {method:'POST'}).catch(() => null);
  if (!res || !res.ok) return;
  const data = await res.json();
  window.__evSaved = data.saved;
  btn.textContent = data.saved ? '◷ Saved to calendar' : '◷ Save to calendar';
  btn.classList.toggle('saved', data.saved);
}

async function shareEvent(eventId) {
  const a = document.createElement('a');
  a.href = `/api/events/${eventId}/share-image`;
  a.download = 'hear-me-out-event.png';
  a.click();
}

load();
</script>
</body>
</html>
